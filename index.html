<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#C4A35A; --gold2:#E8C97A; --dim:#8B6A2A; --ink:#0C0A06; --paper:#F2E8D0; --muted:#C8B890; --wall:#131009; --gallery-bg:#070503; --lb-bg:rgba(3,2,0,.96); }
[data-theme="light"] { --ink:#F5EDD8; --paper:#2B1E0E; --muted:#6B4F2A; --wall:#E8DCC4; --gallery-bg:#D9CEB0; --lb-bg:rgba(240,230,210,.97); }
body { background:var(--ink); color:var(--paper); font-family:'EB Garamond',serif; min-height:100vh; overflow-x:hidden; }
header { text-align:center; padding:18px 20px 14px; border-bottom:1px solid rgba(196,163,90,.14); }
.orn { display:none; }
h1 {
  font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(1.5rem,5vw,3.2rem);
  background:linear-gradient(160deg,var(--dim) 0%,var(--gold2) 35%,var(--gold) 65%,var(--dim) 100%);
  background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:gleam 6s ease-in-out infinite;
}
@keyframes gleam { 0%,100%{background-position:0%} 50%{background-position:100%} }
.sub { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.32em; text-transform:uppercase; color:var(--muted); opacity:.5; margin-top:6px; }
.rule { display:flex; align-items:center; justify-content:center; gap:13px; margin-top:10px; }
.rl { height:1px; width:65px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.rd { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); opacity:.58; }
.gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:2px; padding:2px; background:var(--gallery-bg); }
.card { position:relative; cursor:pointer; overflow:hidden; background:var(--wall); }
.card img { display:block; width:100%; height:auto; transition:transform .55s ease; }
.card:hover img { transform:scale(1.05); filter:brightness(1.07); }
.veil { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.84) 0%,transparent 60%); opacity:0; transition:opacity .32s; }
.card:hover .veil { opacity:1; }
.cap { position:absolute; bottom:0; left:0; right:0; padding:18px 14px 13px; transform:translateY(5px); opacity:0; transition:transform .32s ease, opacity .32s ease; }
.card:hover .cap { transform:translateY(0); opacity:1; }
.cap-title { font-family:'Cinzel',serif; font-size:.8rem; color:var(--paper); }
.cap-artist { font-style:italic; font-size:.74rem; color:var(--gold); margin-top:3px; }
.cap-date { font-size:.6rem; color:var(--muted); opacity:.55; margin-top:2px; }
.lb { display:none; position:fixed; inset:0; z-index:1000; background:var(--lb-bg); backdrop-filter:blur(18px); overflow-y:auto; }
.lb.open { display:block; animation:lbIn .28s ease; }
@keyframes lbIn { from{opacity:0} to{opacity:1} }
.lb-inner { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:40px; padding:60px 28px 80px; }
.lb-img { flex:0 0 auto; max-width:min(580px,88vw); box-shadow:0 28px 80px rgba(0,0,0,.92); }
.lb-img img { display:block; width:100%; height:auto; }
.lb-info { flex:1 1 260px; max-width:340px; }
.lb-tag { font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.38em; text-transform:uppercase; color:var(--gold); opacity:.46; margin-bottom:10px; }
.lb-title { font-family:'Cinzel Decorative',serif; font-size:clamp(1rem,3.5vw,1.65rem); color:var(--paper); line-height:1.2; margin-bottom:7px; }
.lb-artist { font-style:italic; font-size:1rem; color:var(--gold); margin-bottom:13px; }
.lb-hr { height:1px; background:linear-gradient(90deg,rgba(196,163,90,.28),transparent); margin-bottom:15px; }
.lb-fields { display:grid; grid-template-columns:1fr 1fr; gap:11px 14px; margin-bottom:15px; }
.lb-field label { display:block; font-family:'Cinzel',serif; font-size:.48rem; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); opacity:.7; margin-bottom:2px; }
.lb-field span { font-size:.8rem; color:var(--muted); line-height:1.4; }
.lb-desc { font-size:.87rem; line-height:1.7; color:var(--muted); opacity:.68; margin-bottom:14px; }
.lb-credit { font-size:.56rem; color:var(--muted); opacity:.26; }
.lb-close { position:fixed; top:14px; right:14px; z-index:10; width:36px; height:36px; border:1px solid rgba(196,163,90,.26); background:rgba(0,0,0,.72); color:var(--gold); font-size:.88rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.lb-close:hover { background:rgba(196,163,90,.1); }
footer { text-align:center; padding:28px 16px; border-top:1px solid rgba(196,163,90,.06); font-family:'Cinzel',serif; font-size:.48rem; letter-spacing:.2em; color:var(--gold); opacity:.2; text-transform:uppercase; }
.theme-toggle { position:fixed; top:14px; left:14px; z-index:900; width:36px; height:36px; border:1px solid rgba(196,163,90,.26); background:rgba(0,0,0,.35); color:var(--gold); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.theme-toggle:hover { background:rgba(196,163,90,.1); }
[data-theme="light"] .theme-toggle { background:rgba(255,255,255,.45); }
[data-theme="light"] .lb-tag { opacity:.75; }
[data-theme="light"] .lb-field label { opacity:.7; }
[data-theme="light"] .lb-desc { opacity:.85; }
[data-theme="light"] .lb-credit { opacity:.55; }
[data-theme="light"] .lb-close, [data-theme="light"] .lb-nav { background:rgba(200,180,140,.5); border-color:rgba(139,106,42,.4); }

.filters { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; padding:12px 20px 14px; border-bottom:1px solid rgba(196,163,90,.1); }
.filter-wrap { position:relative; }
.filter-btn { font-family:'Cinzel',serif; font-size:.52rem; letter-spacing:.22em; text-transform:uppercase; color:#0C0A06; background:var(--gold); border:1px solid var(--gold); padding:5px 12px 5px 10px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .2s; white-space:nowrap; }
.filter-btn:hover { background:var(--gold2); border-color:var(--gold2); }
.filter-btn.active { background:var(--gold2); border-color:var(--gold2); }
.filter-btn svg { width:7px; height:7px; fill:none; stroke:currentColor; stroke-width:2; transition:transform .2s; flex-shrink:0; }
.filter-btn.open svg { transform:rotate(180deg); }
.filter-dropdown { display:none; position:absolute; top:calc(100% + 4px); left:0; min-width:180px; background:var(--wall); border:1px solid rgba(196,163,90,.22); z-index:200; max-height:260px; overflow-y:auto; }
.filter-dropdown.open { display:block; }
.filter-option { display:block; width:100%; text-align:left; font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); background:transparent; border:none; padding:8px 14px; cursor:pointer; transition:all .15s; }
.filter-option:hover { color:var(--gold); background:rgba(196,163,90,.07); }
.filter-option.selected { color:var(--gold2); }
[data-theme="light"] .filter-dropdown { background:var(--wall); border-color:rgba(139,106,42,.3); }
[data-theme="light"] .filter-option { color:var(--muted); }
.search-bar { display:flex; justify-content:center; padding:14px 20px 4px; }
.search-input { box-sizing:border-box; font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); background:transparent; border:1px solid rgba(196,163,90,.4); padding:7px 14px; width:100%; max-width:320px; outline:none; transition:border-color .2s; text-align:center; }
.search-input::placeholder { color:var(--muted); opacity:.7; }
.search-input:focus { border-color:var(--gold); }
[data-theme="light"] .search-input { color:#5a4012; border-color:rgba(139,106,42,.5); }
.filter-count { font-family:'Cinzel',serif; font-size:.48rem; letter-spacing:.18em; color:var(--gold); opacity:.35; text-align:center; padding:8px; border-top:1px solid rgba(196,163,90,.1); }

.lb-nav { position:fixed; top:50%; transform:translateY(-50%); z-index:10; width:44px; height:44px; border:1px solid rgba(196,163,90,.3); background:rgba(0,0,0,.7); color:var(--gold); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.lb-nav:hover { background:rgba(196,163,90,.15); border-color:var(--gold); }
.lb-prev { left:14px; }
.lb-next { right:58px; }
@media (max-width:600px) { .lb-next { right:14px; } }
.lb-counter { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.25em; color:var(--gold); opacity:.45; z-index:10; }
</style>
</head>

      <div class="lb-artist" id="lbArtist"></div>
      <div class="lb-hr"></div>
      <div class="lb-fields" id="lbFields"></div>
      <p class="lb-desc" id="lbDesc"></p>
      <div class="lb-credit" id="lbCredit"></div>
    </div>
  </div>
</div>
<button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">☀</button>
<footer>All works public domain</footer>
<script>
// Theme toggle
(function(){
  var btn = document.getElementById('themeToggle');
  var saved = localStorage.getItem('rg-theme');
  if (saved === 'light') { document.documentElement.setAttribute('data-theme','light'); btn.textContent = '☽'; }
  btn.addEventListener('click', function(){
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      btn.textContent = '☀';
      localStorage.setItem('rg-theme','dark');
    } else {
      document.documentElement.setAttribute('data-theme','light');
      btn.textContent = '☽';
      localStorage.setItem('rg-theme','light');
    }
  });
})();

on/search/459062"},{"title":"Triptych: The Last Judgment","artist":"Master of the Orléans Triptych","tag":"Paintings","date":"ca. 1500","medium":"Painted enamels on copper, partly gilded.","dims":"Center plaque 25 x 22 cm; left plaque 25 x 10 cm; right plaque 25 x 10 cm","loc":"Metropolitan Museum of Art, New York, NY","desc":"Robert Lehman Collection, 1975","img":"https://images.metmuseum.org/CRDImages/rl/original/SLP1225-1_6635.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/rl/web-large/SLP1225-1_6635.jpg","credit":"Robert Lehman Collection, 1975","link":"https://www.metmuseum.org/art/collection/search/460519"},{"title":"The Temptation of Saint Mary Magdalen","artist":"Johann Liss","tag":"Paintings","date":"ca. 1626","medium":"Oil on canvas","dims":"38 7/8 × 49 1/2 in. (98.8 × 125.8 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Purchase, Walter and Leonore Annenberg Acquisitions Endowment Fund; Gifts of Irma N. Straus and Lionel F. Straus Jr., in memory of his parents, and Bequests of Milena Jurzykowski and Theodore M. Davis, by exchange; Gwynne Andrews and Victor Wilbour Memorial Funds; Charles and Jessie Price Gift, and funds from various donors, 2020","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-19542-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-19542-001.jpg","credit":"Purchase, Walter and Leonore Annenberg Acquisitions Endowment Fund; Gifts of Irma N. Straus and Lionel F. Straus Jr., in memory of his parents, and Bequests of Milena Jurzykowski and Theodore M. Davis, by exchange; Gwynne Andrews and Victor Wilbour Memorial Funds; Charles and Jessie Price Gift, and funds from various donors, 2020","link":"https://www.metmuseum.org/art/collection/search/828241"},{"title":"Virgin and Child Enthroned","artist":"Bohemian Painter","tag":"Paintings","date":"ca. 1345–50","medium":"Oil(?) and gold on wood","dims":"10 3/16 × 7 15/16 × 7/16 in. (25.8 × 20.2 × 1.1 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Purchase, George T. Delacorte Jr. Gift, by exchange; Michel David-Weill Gift; The Lesley and Emma Sheafer Collection, Bequest of Emma A. Sheafer and Gift of Mr. and Mrs. Malcom P. Ripley, by exchange; The Rendl Fund; Lila Acheson Wallace Gift; and funds from various donors, by exchange, 2020","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-20592-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-20592-001.jpg","credit":"Purchase, George T. Delacorte Jr. Gift, by exchange; Michel David-Weill Gift; The Lesley and Emma Sheafer Collection, Bequest of Emma A. Sheafer and Gift of Mr. and Mrs. Malcom P. Ripley, by exchange; The Rendl Fund; Lila Acheson Wallace Gift; and funds from various donors, by exchange, 2020","link":"https://www.metmuseum.org/art/collection/search/838076"},{"title":"Landscape with a Stone Bridge","artist":"Rembrandt van Rijn","tag":"Paintings","date":"c. 1638","medium":"oil on panel","dims":"height 29.5 cm x width 42.5 cm x depth 5.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Rembrandt painted only a few landscapes, mostly imaginary mountain scenes. Although The Stone Bridge is composed of elements studied from reality, it probably does not represent a specific place. The painting’s magical quality derives from its dramatic illumination: a beam of sunlight breaks through the clouds, making the approaching storm seem twice as menacing.","img":"https://iiif.micr.io/hodeb/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/hodeb/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1935--d27d7ce1f58c87131f14425799c2d0a4"},{"title":"The Night Watch Militia Company of District II under the Command of Captain Frans Banninck Cocq","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1642","medium":"oil on canvas","dims":"height 379.5 cm x width 453.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Rembrandt’s largest, most famous canvas was made for the Arquebusiers guild hall. This was one of several halls of Amsterdam’s civic guard, the city’s militia and police. Rembrandt was the first to paint figures in a group portrait actually doing something. The captain, dressed in black, is telling his lieutenant to start the company marching. The guardsmen are getting into formation. Rembrandt used the light to focus on particular details, like the captain’s gesturing hand and the young girl in the background. She was the company mascot.","img":"https://iiif.micr.io/PJEZO/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/PJEZO/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-5--3137deb45cd7765f9a76084a16c99544"},{"title":"The Sampling Officials of the Amsterdam Drapers’ Guild, Known as ‘The Syndics’","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1662","medium":"oil on canvas","dims":"height 191.5 cm x width 279 cm","loc":"Rijksmuseum, Amsterdam","desc":"After suffering financial difficulties in the 1650s, Rembrandt moved to a rental house on the Rozengracht. The Amsterdam élite no longer knocked on his door as often as they had done before. He nevertheless remained popular: this important guild commissioned him to paint a group portrait. Rembrandt produced a lively scene by having the wardens look up from their work as if interrupted by our arrival.","img":"https://iiif.micr.io/cWWQE/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/cWWQE/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-6--575b43f479d021359fb5f63b32f7c234"},{"title":"Man in Oriental Dress","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1635","medium":"oil on panel","dims":"height 72 cm x width 54.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Rembrandt manipulated light in a highly personal way. Here, the man’s turban and the right side of his face are brilliantly illuminated, while the left side is in shadow. Character heads like this – they are not portraits – were extremely popular in the 17th century; early on, they were widely copied and imitated. They were known as ‘Turkish tronies’.","img":"https://iiif.micr.io/VzuFK/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/VzuFK/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3340--7aaadc1f26ec652044aa6e1150576fd6"},{"title":"Still Life with Peacocks","artist":"Rembrandt van Rijn","tag":"Paintings","date":"c. 1639","medium":"oil on canvas","dims":"height 145 cm x width 135.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"In Rembrandt’s time, peacocks were eaten by the well-to-do: the meat was incorporated into meat pies, among other dishes. Immediately after being killed, the birds were hung to bleed out, as Rembrandt shows us in this storeroom. He was doubtless captivated by the plumage’s splendid marks, the riot of colours: blue, green and yellow ochre.","img":"https://iiif.micr.io/vBXKy/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/vBXKy/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3981--f587116afd69080374247e6d5271fd1a"},{"title":"Isaac and Rebecca, Known as ‘The Jewish Bride’","artist":"Rembrandt van Rijn","tag":"Paintings","date":"c. 1665 - c. 1669","medium":"oil on canvas","dims":"height 121.5 cm x width 166.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"To prevent being killed and having his wife captured by King Abimelech, Isaac concealed his love for Rebecca by pretending they were brother and sister. However, their intimacy betrayed them when they thought they were not being spied on. Rembrandt depicts them in a tender moment. Furthermore, he works with exceptional freedom, applies the paint thickly, and scratches into it with the butt end of his paintbrush.","img":"https://iiif.micr.io/uRWXq/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/uRWXq/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-216--019c1265e6dbf108d4587ab2b7c02c66"},{"title":"Musical Company","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1626","medium":"oil on panel","dims":"height 63.5 cm x width 48 cm","loc":"Rijksmuseum, Amsterdam","desc":"The subject of this painting is a mystery: is it an exhortation to praise God through singing and string music, or a scene of seduction with the old woman as a procuress? In any case, in this early work Rembrandt used elements from his own surroundings: his mother modelled for the old woman, and Rembrandt’s own features can be recognized in the young man.","img":"https://iiif.micr.io/hdvov/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/hdvov/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4674--4105653475611e18aa52560284964200"},{"title":"Portrait of Haesje Jacobsdr van Cleyburg","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1634","medium":"oil on panel","dims":"height 68.6 cm x width 53.4 cm","loc":"Rijksmuseum, Amsterdam","desc":"Rembrandt travelled to Rotterdam to portray the brewing couple Haesje van Cleyburg and Dirck Pesser, who were part of the city’s Remonstrant elite. While at first glance her attire may seem modest, in reality it was quite lavish. The millstone collar around her neck was a very expensive accessory, requiring as much as fifteen metres of fabric.","img":"https://iiif.micr.io/pNusU/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/pNusU/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4833--98719e83615f7d4f74a2a866ecc3749f"},{"title":"Portrait of a Woman, Probably Maria Trip (1619-1683)","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1639","medium":"oil on panel","dims":"height 107 cm x width 82 cm","loc":"Rijksmuseum, Amsterdam","desc":"The sitter is likely the 20-year-old Maria Trip. She hailed from an extremely wealthy family involved in the arms trade. Here, she displays her affluence in full regalia: she wears a collar of the finest lace, a brooch with matching earrings, and a fortune in pearls.\r\nThe Chinese folding fan in her left hand was still a very rare and therefore precious accessory in 1639.","img":"https://iiif.micr.io/FeurF/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/FeurF/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-597--6f7272f48fb3fbb02ceecf7aa897f1a7"},{"title":"Young Woman in Fantasy Costume","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1633","medium":"oil on panel","dims":"height 86.8 cm x width 70.5 cm x depth 6.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"The young woman’s clothing is not in keeping with the fashions of Rembrandt’s day, but rather reflects styles of earlier centuries. The woman’s distinctive features – a domed forehead, slightly bulging eyes, and pronounced chin – are easily recognized in depictions of ancient goddesses and heroines that Rembrandt painted in the 1630s. Thus the painting is not strictly a portrait, but a ‘tronie’, or fantasy head.","img":"https://iiif.micr.io/ryBbQ/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ryBbQ/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4057--74e5d98ac8bb3d68d3a00d6eeb2b22ff"},{"title":"Tobit and Anna with the Kid","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1626","medium":"oil on panel","dims":"height 39.5 cm x width 30 cm","loc":"Rijksmuseum, Amsterdam","desc":"Tobit’s blindness has condemned him and his wife to a life of grinding poverty: his once expensive tabard is torn and tattered. When Anna comes home with a kid, a reward for her hard work, Tobit thinks she has stolen it. In desperation, he prays God to grant him a quick death. Anna looks on in bewilderment.","img":"https://iiif.micr.io/myXdn/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/myXdn/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4717--04e00112e65cde2ed5705578f4a21f15"},{"title":"Self-portrait as the Apostle Paul","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1661","medium":"oil on canvas","dims":"height 91 cm x width 77 cm","loc":"Rijksmuseum, Amsterdam","desc":"Rembrandt is 55 years old in this self-portrait, and he still looks at himself candidly. Here he assumes the guise of a personage from the Bible, the Apostle Paul. The sword protruding from his cloak and the manuscript in his hands are the apostle’s customary attributes. By using his own face, Rembrandt encouraged the viewer to engage personally with the saint.","img":"https://iiif.micr.io/wqcDn/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/wqcDn/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4050--4faa97ed774e6e3f81b76cf3aed6226d"},{"title":"Johannes Wtenbogaert","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1633","medium":"oil on canvas","dims":"height 130 cm x width 103 cm","loc":"Rijksmuseum, Amsterdam","desc":"The Amsterdam merchant Abraham Anthonisz Recht was a convinced Remonstrant and great admirer of Wtenbogaert. He commissioned this portrait from Rembrandt in 1633 and hung it in his home. Wtenbogaert looks at you with a penetrating gaze, he is clearly a man of moral authority. And, a man of the Word, as the open book suggests. But exactly which book it is, remains unknown.","img":"https://iiif.micr.io/vWfAy/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/vWfAy/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4885--648ec94734a4e68faf568ace93add229"},{"title":"The Standard Bearer","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1636","medium":"olieverf op doek","dims":"height 102.6 cm x width 97.5 cm x depth 3.2 cm x height 118.8 cm x width 96.8 cm","loc":"Rijksmuseum, Amsterdam","desc":"Rembrandt’s ensign proudly poses near a column, the symbol of fortitude, his dagger within reach. Ensigns carried the banner of the civic guard or army. They had to defend this symbol with their life. When Rembrandt painted The Standard Bearer he had just begun working for himself and was experimenting with a loose painting style. Rembrandt took himself as the model: the face behind the walrus moustache is recognizably his own.","img":"https://iiif.micr.io/wceCO/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/wceCO/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-5092--276afc534e38c0f29adceef589000c3a"},{"title":"Portrait of Ephraim Bueno","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1645 - 1647","medium":"oil on panel","dims":"depth 6 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ephraim Bueno (1599–1665), a Jewish physician, poet and translator from Portugal, probably belonged to Rembrandt’s circle of friends. Rembrandt painted his portrait as a preparatory study for a print. He concentrated on the face and the division of light and dark; the rest was less important for the purposes of this sketch. This explains the fairly coarse brushstrokes for the clothing and hands.","img":"https://iiif.micr.io/sRVhF/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/sRVhF/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3982--de32778990f7ea84951038afa906c8dd"},{"title":"Joseph Telling his Dreams","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1633","medium":"olieverf op papier op karton","dims":"height 51 cm x width 39 cm","loc":"Rijksmuseum, Amsterdam","desc":"Using loose brushstrokes, Rembrandt sketched Joseph telling his dreams to his parents and brothers. That they do not believe him is clear from their poses and facial expressions. Rembrandt made this rough oil sketch as a preparatory study for a large print, which, however, was never executed. The fact that this study has been preserved is remarkable, since much working material was lost over the course of time.","img":"https://iiif.micr.io/tKyHp/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/tKyHp/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3477--012801784a722a40791728005bf66acb"},{"title":"Portrait of Marten Soolmans","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1634","medium":"olieverf op doek","dims":"height 207.5 cm x width 132 cm x depth 3.7 cm","loc":"Rijksmuseum, Amsterdam","desc":"Marten and Oopjen are the only couple that Rembrandt painted life-size, standing, and at full-length. Marten’s father came to Amsterdam from Antwerp as a Protestant refugee. He made his fortune as the owner of a sugar refinery. Marten married Oopjen in 1633. He was 20 and a law student, ready for a career in politics. Sadly, he died a mere eight years later.","img":"https://iiif.micr.io/ydvFQ/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ydvFQ/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-5033--8e1e37eae253bf0f528928483b8ca933"},{"title":"Portrait of Oopjen Coppit","artist":"Rembrandt van Rijn","tag":"Paintings","date":"1634","medium":"oil on canvas","dims":"height 207.5 cm x width 132 cm x depth 3.6 cm","loc":"Rijksmuseum, Amsterdam","desc":"Oopjen was the eldest of three daughters of an old, affluent Amsterdam family. She sat to Rembrandt one year after her wedding with Marten. She was 23, and pregnant with her first child. The marriage represented an alliance between an established family and one of newcomers. This was celebrated with the commission of monumental likenesses from the city’s leading portraitist, namely Rembrandt van Rijn.","img":"https://iiif.micr.io/WjxgV/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/WjxgV/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-1768--6b7d967cdf05b81c2416359e06adaf52"},{"title":"The Milkmaid","artist":"Johannes Vermeer","tag":"Paintings","date":"c. 1660","medium":"oil on canvas","dims":"height 45.5 cm x width 41 cm","loc":"Rijksmuseum, Amsterdam","desc":"A maidservant pours milk, entirely absorbed in her work. Except for the stream of milk, everything else is still. Vermeer took this simple everyday activity and made it the subject of an impressive painting – the woman stands like a statue in the brightly lit room. Vermeer also had an eye for how light by means of hundreds of colourful dots plays over the surface of objects.","img":"https://iiif.micr.io/QkOGy/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/QkOGy/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2344--42dd0e658c2979aec8e144d2357c55c0"},{"title":"The Love Letter","artist":"Johannes Vermeer","tag":"Paintings","date":"c. 1669 - c. 1670","medium":"oil on canvas","dims":"height 44 cm x width 38.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Vermeer chose an unusual vantage point for this painting. From a dim space in the foreground, a glimpse is afforded of another room with a domestic scene. An elegantly dressed woman looks up expectantly at a maidservant, who has just handed her a letter. The seascape on the wall behind them may well allude to the epistle’s subject: during the 17th century, the sea was often compared to love, and the lover to a ship.","img":"https://iiif.micr.io/hqxQG/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/hqxQG/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1595--508513eb7ee162ec2f68ea3d3138d912"},{"title":"View of Houses in Delft, Known as ‘The Little Street’","artist":"Johannes Vermeer","tag":"Paintings","date":"c. 1658","medium":"oil on canvas","dims":"height 54.3 cm x width 44 cm x depth 9 cm","loc":"Rijksmuseum, Amsterdam","desc":"This is an unusual painting in Vermeer’s oeuvre, and remarkable for its time as a portrait of ordinary houses. The composition is as exciting as it is balanced. The old walls with their bricks, whitewash, and cracks are almost tangible. The location is Vlamingstraat 40–42  in Delft. Vermeer’s aunt Ariaentgen Claes lived in the house at the right, with her children, from around 1645 until her death in 1670.","img":"https://iiif.micr.io/VWEov/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/VWEov/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2860--a7dbf937cbd6f7c30f66f8aca4a0207c"},{"title":"Woman Reading a Letter","artist":"Johannes Vermeer","tag":"Paintings","date":"c. 1663","medium":"oil on canvas","dims":"height 46.5 cm x width 39 cm x depth 6.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Enjoying a quiet, private moment, this young woman is absorbed in reading a letter in the morning light. She is still wearing her blue night jacket. All of the colours in the composition are secondary to its radiant lapis lazuli blue. Vermeer recorded the effects of light with extraordinary precision. Particularly innovative is his rendering of the woman’s skin with pale grey, and the shadows on the wall using light  blue.","img":"https://iiif.micr.io/aehHx/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/aehHx/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-251--8e9e02c8045362ffb2171b2fb52953ba"},{"title":"Portrait of Jan van de Poll (1597-1678)","artist":"Frans Hals","tag":"Paintings","date":"c. 1637","medium":"oil on canvas","dims":"width 66.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Jan van de Poll (1597-1678), seven times mayor of Amsterdam, husband of Duifje van Gerwen. Breast statue, sitting on a chair, a stick in the right hand. Pendant of SK-A-1247.","img":"https://iiif.micr.io/tMAzx/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/tMAzx/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1246--5ee4f2145982f3838bbf150792598740"},{"title":"Portrait of Duijfje van Gerwen (1618-1658)","artist":"Frans Hals","tag":"Paintings","date":"c. 1637","medium":"oil on canvas","dims":"width 68 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of a woman, possibly Sara Wolphaerts van Diemen, second wife of Nicolaes Hasselaer. Chest image to the left, with a large pleated collar. Pendant from SK-A-1246.","img":"https://iiif.micr.io/OUbxD/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/OUbxD/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1247--2b5ae58550308d1c8564f84fc702f8e4"},{"title":"Portrait of a Married Couple, Likely Isaac Abrahamsz Massa and Beatrix van der Laen","artist":"Frans Hals","tag":"Paintings","date":"c. 1622","medium":"oil on canvas","dims":"width 166.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"It was rare for a married couple to be portrayed lifesize and together in a single painting, and even more so in such an intimate and joyful manner. The patron would have had to have been receptive to such innovation. The close friendship between Hals and the newlywed couple, presumably Isaac Abrahamsz Massa and Beatrix van der Laen, likely played a crucial role in facilitating the creation of this audacious portrait.","img":"https://iiif.micr.io/ZrjcE/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ZrjcE/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-133--29d98c79eda4e9d954f80ce0bb0c8b17"},{"title":"The Merry Drinker","artist":"Frans Hals","tag":"Paintings","date":"c. 1628 - c. 1630","medium":"oil on canvas","dims":"width 66.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"This work is a pinnacle of Hals’ bold and loose ‘rough’ style. The brushstrokes criss-cross the canvas, creating the impression of rapid execution as well as suggesting movement. The sitter, likely a civic guardsman or a military man based on his attire, is just about to raise his glass to toast with us.","img":"https://iiif.micr.io/CgrHr/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/CgrHr/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-135--884b50ad9157e0b12a90e4a5e8acf336"},{"title":"Portrait of Feyntje van Steenkiste","artist":"Frans Hals","tag":"Paintings","date":"1635","medium":"oil on canvas","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"Feyntje van Steenkiste hailed from a prosperous family active in the Haarlem textile industry, a connection shared by her husband Lucas de Clercq and his family. Their union strengthened the business ties between their respective families. Van Steenkiste’s wealth and Mennonite faith are evident in her clothing choices: elegant, yet sober. For example, in contrast to many of her more lavishly attired contemporaries, her wrists are adorned with just a hint of delicate white lace.","img":"https://iiif.micr.io/syPHr/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/syPHr/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-557--62c0c747f3b9945b95195581d59e2979"},{"title":"Portrait of Lucas de Clercq","artist":"Frans Hals","tag":"Paintings","date":"c. 1635","medium":"oil on canvas","dims":"width 91.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Lucas de Clercq and Feyntje van Steenkiste were Mennonites, a movement within Protestantism known for its sober character. This explains why they had their likenesses painted in such a plain manner. De Clercq’s pose, however, is anything but modest. With his arm akimbo, he exudes self-assurance. This quality is further emphasized by his right arm, which is not in a sling, but stylishly swathed in costly fabric.","img":"https://iiif.micr.io/rXJqt/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/rXJqt/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-556--b2ac0f885a2db0661dabe277884ad60b"},{"title":"Militia Company of District XI under the Command of Captain Reynier Reael","artist":"Pieter Codde","tag":"Paintings","date":"1637","medium":"oil on canvas","dims":"width 452 cm","loc":"Rijksmuseum, Amsterdam","desc":"So much went wrong with this Amsterdam militia company portrait. Hals made several trips to the capital to portray the guardsmen, but some never showed up. Finally, he insisted they come to Haarlem, but they refused, instead engaging the Amsterdam painter Pieter Codde to complete the work. Hals’ progress then remains unclear, but the composition and the seven figures on the left seem to be largely by him.","img":"https://iiif.micr.io/ZfDYa/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ZfDYa/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-374--39d1a561a0e487fe7f299dbaf6314d22"},{"title":"Portrait of Maritge Claesdr Vooght","artist":"Frans Hals","tag":"Paintings","date":"1639","medium":"oil on canvas","dims":"width 93.2 cm","loc":"Rijksmuseum, Amsterdam","desc":"Maritge Vooght grew up in a Haarlem family business of brewers. She married Pieter Olycan at the age of 18. Their union allowed him to hold high positions and he became co-heir to the brewery. In addition, they established a brewery of their own, which as was usual then, was registered under Pieter’s name. Their daughter Geertruyt successfully carried on the family business. That they were prosperous is evidenced by Vooght’s expensive clothing and precious church book.","img":"https://iiif.micr.io/DjGYX/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/DjGYX/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-139--2ac6a353e8cdf054ad95122aa35babb4"},{"title":"Portrait of a Man, possibly a Clergyman","artist":"Frans Hals","tag":"Paintings","date":"c. 1657 - c. 1660","medium":"oil on panel","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"The sitter’s identity is unknown. Based on the headgear (calotte) he is wearing, it has been assumed that he is a clergyman. However, this is not certain, as people from other walks of life also wore similar skullcaps. In his final days, Hals created an entire series of smaller portraits of this kind.","img":"https://iiif.micr.io/XnkRY/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/XnkRY/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2859--68683e32cc1dc98bb2a78d24c6d166f6"},{"title":"Children Teaching a Cat to Dance, Known as The Dancing Lesson","artist":"Jan Steen","tag":"Paintings","date":"1660 - 1679","medium":"oil on panel","dims":"height 68.5 cm x width 59 cm","loc":"Rijksmuseum, Amsterdam","desc":"These children are up to mischief: they are teaching a cat to dance to the music of a small shawm. Widely used between the 15th and 17th centuries, the shawm was the predecessor of the oboe. Mostly played in dance and ceremonial music, shawms were appreciated for their loud tone.","img":"https://iiif.micr.io/zpbFV/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/zpbFV/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-718--40acc398a86a306d05d286fa947cffcc"},{"title":"The Quack","artist":"Jan Steen","tag":"Paintings","date":"1650 - 1660","medium":"oil on panel","dims":"height 59 cm x width 72 cm","loc":"Rijksmuseum, Amsterdam","desc":"The quack. In a village square, a quack stands on an elevation under a large tree, showing the villagers the molar (or stone) he pulled from a man tied to a chair. At the man's feet is a basket of eggs. On the table are all kinds of bottles and jars and a document with a seal. To the right of the foreground, a woman pushes her drunken husband into a wheelbarrow. On the far right, a violin hangs from a pole on which a monkey with a pipe sits.","img":"https://iiif.micr.io/agWzx/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/agWzx/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-387--d6678346b55a79b3f10e0020e06943a6"},{"title":"Woman at her Toilet","artist":"Jan Steen","tag":"Paintings","date":"1655 - 1660","medium":"oil on panel","dims":"height 37 cm x width 27.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Presented here is an intimate moment of a young woman undressing before going to bed. She is in the midst of pulling off a stocking, with the imprint of the garter still visible just below her knee. The raised skirt provides a glimpse along her legs. Such explicit nudity, however, was not always deemed acceptable; until a hundred years ago, an underskirt was painted over her thighs.","img":"https://iiif.micr.io/QQSGo/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/QQSGo/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4052--731e266a7be9a2db97f1d7eb11c8687c"},{"title":"The Merry Family","artist":"Jan Steen","tag":"Paintings","date":"1668","medium":"oil on canvas","dims":"height 110.5 cm x width 141 cm","loc":"Rijksmuseum, Amsterdam","desc":"The entire family is in high spirits, creating a ruckus: father, mother, and grandmother sing loudly, the children join in, and they even puff on long pipes. The note on the mantelpiece hints that there is a lesson to be learned from this painting: ‘As the old sing, so shall the young twitter.’ What is to become of the children if their parents set the wrong example?","img":"https://iiif.micr.io/SbsFC/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/SbsFC/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-229--f6c4f4db1681a8704b372bda0183623b"},{"title":"Interior with a Woman Feeding a Parrot, Known as ‘The Parrot Cage’","artist":"Jan Steen","tag":"Paintings","date":"c. 1660 - c. 1670","medium":"oil on canvas on panel","dims":"height 50 cm x width 40 cm","loc":"Rijksmuseum, Amsterdam","desc":"This scene bursts with life. On the left, a woman is frying oysters, while a mischievous boy tries to feed a cat. On the right, two men are playing a game of trictrac (a kind of backgammon). Through his use of colour, Steen directed attention to the woman in the middle giving a parrot a biscuit. Thanks to the light falling on her and her green and violet gown, she stands out against the other, more drably painted figures.","img":"https://iiif.micr.io/qYUHU/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/qYUHU/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-386--d30ae93dc80ff7c3ef53c2f66b70145d"},{"title":"The Drunken Couple","artist":"Jan Steen","tag":"Paintings","date":"c. 1655 - c. 1665","medium":"oil on panel","dims":"height 52.5 cm x width 64 cm","loc":"Rijksmuseum, Amsterdam","desc":"A man and woman are so drunk that they are unaware they are being robbed. Their foolishness is underscored by the print on the partition. It depicts an owl, considered a stupid creature in the 17th century. After all, it could not see by day, not even with a candle or eyeglasses. The drunken couple is thus just as blind as the owl, a message that survives in the English idiom ‘blind as a bat’.","img":"https://iiif.micr.io/cgoFu/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/cgoFu/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-232--043a49f5616590a42a278af79768d322"},{"title":"The Sick Woman","artist":"Jan Steen","tag":"Paintings","date":"c. 1663 - c. 1666","medium":"oil on canvas","dims":"height 76 cm x width 63.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Faint from fever, the young woman rests her head on a pillow. Is she perhaps lovesick? Is she pregnant? To find out, a quack would put a strip of his patient’s clothing in a brazier to smoulder – the scent would disclose her secret. Jan Steen here presents such a charlatan making a diagnosis. His old-fashioned attire characterizes him as a comic character.","img":"https://iiif.micr.io/PMpOJ/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/PMpOJ/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-230--0df2a3aef123a06a24bd57df17b1923a"},{"title":"Prince’s Day","artist":"Jan Steen","tag":"Paintings","date":"1660 - 1679","medium":"oil on panel","dims":"height 46 cm x width 62.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Prince’s Day! This popular feast-day celebrated the birthday (14 November 1650) of Prince William III of\r\nOrange-Nassau. How this was done is explained on the piece of paper on the floor in the middle foreground.\r\nThis translates as: ‘To the health of the Nassau laddie, in one hand a rapier, and in the other a glass raised gladly.’ This is sure to boost spirits; the revellers take no notice of the portrait of the prince ‘overlooking’ the scene.","img":"https://iiif.micr.io/JXVQd/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/JXVQd/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-384--4e7e83f2ca92a1a3dba02fce8728d83f"},{"title":"Self-portrait","artist":"Jan Steen","tag":"Paintings","date":"c. 1670","medium":"oil on canvas","dims":"height 95 cm x width 85.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"A distinguished citizen dressed in decorous black is seated before a red curtain and tassel. Jan Steen, known primarily for his humorous scenes with simple folk, portrayed himself here as utterly self-assured. He also regularly included himself in other paintings, but then usually in a comic role.","img":"https://iiif.micr.io/hbNwm/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/hbNwm/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-383--9b33832bda3a89f192902f94769cf3cd"},{"title":"Adolf and Catharina Croeser, Known as ‘The Burgomaster of Delft and his Daughter’","artist":"Jan Steen","tag":"Paintings","date":"1655","medium":"oil on canvas","dims":"height 82.5 cm x width 68.5 cm x depth cm","loc":"Rijksmuseum, Amsterdam","desc":"Legs wide apart and his right arm akimbo, Croeser sits on the stoop of his house on the Oude Delft canal in Delft. His thirteen-year-old daughter Catharina looks straight out at us. Jan Steen included a narrative element in this portrait: a poor woman and child beg for alms from the wealthy grain merchant. In 1657, just two years after this portrait was made, Croeser stood surety for Steen, who was seriously in debt.","img":"https://iiif.micr.io/QQWEh/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/QQWEh/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4981--9d0b6b75646aaaa22fc25e7eacdb65b5"},{"title":"The Merry homecoming","artist":"Jan Steen","tag":"Paintings","date":"1670 - 1679","medium":"oil on canvas","dims":"depth 13.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"The cheerful return home. A drunken man is helped in the direction of a barge by an older man and a woman. In the boat is a mother with a child at her breast and a boy playing the flute. In the background are three figures at the entrance of the inn.","img":"https://iiif.micr.io/YmdXt/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/YmdXt/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-389--1e11bdf284878da553c38e4339a2525e"},{"title":"Woman scouring metalware","artist":"Jan Steen","tag":"Paintings","date":"1650 - 1660","medium":"oil on panel","dims":"depth 7 cm","loc":"Rijksmuseum, Amsterdam","desc":"The boiler sander. In a utility room, a young girl scrapes a tin can on a barrel. Next to her on a chair are a lantern, plates, and spoons. On the left in the background a water pump, broom and colander.","img":"https://iiif.micr.io/FmYVa/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/FmYVa/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-391--38f373f9671e1fcdf5ea032e74676287"},{"title":"A Couple drinking","artist":"Jan Steen","tag":"Paintings","date":"1660 - 1679","medium":"oil on panel","dims":"height 24.5 cm x width 21 cm","loc":"Rijksmuseum, Amsterdam","desc":"A drinking couple. A seated young woman wearing a white headscarf takes a sip from a flute glass. On the right, a young man with a jar of wine.","img":"https://iiif.micr.io/qZYTm/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/qZYTm/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-233--b81cff032204076bab3da4701d8d9f9b"},{"title":"Supper at Emmaus","artist":"Jan Steen","tag":"Paintings","date":"c. 1665 - c. 1668","medium":"oil on canvas","dims":"depth 8.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"On their way to Emmaus, two Disciples unexpectedly encounter Christ. At first they do not recognise him. As they sit to eat and they break bread, they realise who he is. And at that moment, he disappears. That is the moment Jan Steen depicts here: Christ’s shade is just visible on the left beneath the arbour.","img":"https://iiif.micr.io/PjxJp/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/PjxJp/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1932--ab9a1449855272cf0af41dc419191cb2"},{"title":"Erysichthon selling his daughter","artist":"Jan Steen","tag":"Paintings","date":"1650 - 1660","medium":"oil on canvas","dims":"depth 7.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Erysichthon, sitting on a tree trunk, sells his daughter Mestra (Ovid's Metamorphoses VIII, 738-878). On the ground are large loaves of bread, a basket of fish, a large jug, and a basket of fruit. An axe is leaning against the tree trunk.","img":"https://iiif.micr.io/NwoZo/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/NwoZo/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2572--de17fb5202505bc4ec9e13e6368c3f40"},{"title":"Peasant wedding","artist":"Jan Steen","tag":"Paintings","date":"1672","medium":"oil on panel","dims":"height 38.5 cm x width 50 cm","loc":"Rijksmuseum, Amsterdam","desc":"A farmer's wedding is celebrated in an inn. At a table on the right, the bride is surrounded by men, a tapestry hangs on the wall behind her. The groom sits to her left and drinks his glass empty. In the foreground, an old man dances to the music of musicians with violin and cello. To the left, a standing man and woman watch. On the floor are eggshells, bones, a plate and a spoon.","img":"https://iiif.micr.io/ShYnc/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ShYnc/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-388--bbd386b5af5685503d43622d40642fa9"},{"title":"The Adoration of the shepherds","artist":"Jan Steen","tag":"Paintings","date":"1660 - 1679","medium":"oil on canvas","dims":"height 53 cm x width 64 cm","loc":"Rijksmuseum, Amsterdam","desc":"Jan Steen (1626 - 1679). The Adoration of the shepherds, c. 1660.Tenderly Mary shows the newborn baby Jesus to the shepherds. They have come to the stable in great numbers, bearing all sorts of gifts. They gaze in reverence at the radiant child in the manger. The stable, in which an ox and a donkey occupy a prominent place, is shrouded in darkness. But outside, the dawn is nigh, a reference to the era heralded by the birth of Jesus. Jan Steen has transformed this biblical tale into an eminently human event. There is the same warmth and humour as in the scenes of everyday life: Joseph accepts a bowl of eggs, while on the left a child is warming up some porridge. From the collection of H. Witsen (Amsterdam), the Lord of Tabley, and others. Purchased in 1947.","img":"https://iiif.micr.io/ytMyu/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ytMyu/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3509--90b2dd68a53ae0e79757736d1327524a"},{"title":"Family scene","artist":"Jan Steen","tag":"Paintings","date":"1660 - 1679","medium":"oil on panel","dims":"depth 8 cm","loc":"Rijksmuseum, Amsterdam","desc":"This colorful company celebrates. In the back right, a gentleman and a lady are stiffly looking at the bon vivants. Curious is the owl above their head. At the time, the owl was a symbol of stupidity, drunkenness and hypocrisy. Jan Steen probably mocked the so-called piety of his contemporaries here.","img":"https://iiif.micr.io/zJfXH/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/zJfXH/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-231--0ed0bded61a1d8cd614244ba08b46a21"},{"title":"The Feast of St Nicholas","artist":"Jan Steen","tag":"Paintings","date":"1665 - 1668","medium":"oil on canvas","dims":"height 82 cm x width 70.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"The feast of St Nicholas takes place in December. In the Netherlands, it has been celebrated in the same way for centuries. Good children receive gifts from the saint. The little girl in the foreground, for instance, has a bucket full of treats. Naughty children, like the wailing boy at the left, get only a switch (a bundle of twigs) in their shoe. Jan Steen was a born storyteller. He succeeded in incorporating all of the elements of the popular feast in this picture.","img":"https://iiif.micr.io/WZzyz/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/WZzyz/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-385--b61f0c4c7cf5a503a2246ecde104fd28"},{"title":"Baker’s Couple Arent Oostwaard and Catharina Keizerswaard","artist":"Jan Steen","tag":"Paintings","date":"1658","medium":"oil on panel","dims":"height 37.7 cm x width 31.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"This baker’s couple from Leiden proudly proffer their freshly baked loaves and rolls. An old inscription on the back of the painting gives their names. The boy is also mentioned: he is the painter’s son. He may blow the horn to let people know the bread is ready. Jan Steen combined several genres in a single painting – it serves as a family portrait, a still life of bread, and a portrayal of a profession all at once.","img":"https://iiif.micr.io/ZVUun/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ZVUun/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-390--b978f25e1f9b9169a3d6d82ffa8d0d66"},{"title":"View of Haarlem from the Northwest, with the Bleaching Fields in the Foreground","artist":"Jacob van Ruisdael","tag":"Paintings","date":"c. 1650 - c. 1682","medium":"oil on canvas","dims":"height 43 cm x width 38 cm","loc":"Rijksmuseum, Amsterdam","desc":"Foreigners experience the flat Dutch landscape as having a straight, low horizon extending under a vast sky with billowing cumulus clouds. This is how Ruisdael painted the Haarlem skyline in the distance, recognizable by the high roof of St Bavo’s. Lengths of cloth bleaching in the sun lie at the foot of the dunes in the foreground. The Haarlem linen industry relied on the pure dune water.","img":"https://iiif.micr.io/dNkMA/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/dNkMA/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-351--b592b67f86e35e47e704cde12e96a637"},{"title":"The Windmill at Wijk bij Duurstede","artist":"Jacob van Ruisdael","tag":"Paintings","date":"c. 1668 - c. 1670","medium":"oil on canvas","dims":"height 83 cm x width 101 cm","loc":"Rijksmuseum, Amsterdam","desc":"The windmill rises up majestically, defying the dark rain clouds and overshadowing the castle and the church of Wijk bij Duurstede. The River Lek flows in the foreground. This painting is world famous, and rightly so. In this impressive composition, Ruisdael united all the typical Dutch elements – the low-lying land, the water and the expansive sky – manipulating them to converge on the equally characteristic Dutch mill.","img":"https://iiif.micr.io/XWEFp/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/XWEFp/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-211--fb2b57919550092bf709472f81426eab"},{"title":"Mountainous Landscape with Waterfall","artist":"Jacob van Ruisdael","tag":"Paintings","date":"1650 - 1682","medium":"oil on canvas","dims":"height 111 cm x width 99 cm","loc":"Rijksmuseum, Amsterdam","desc":"Mountain landscape with a waterfall between rocks and tree trunks. The river flows through a valley between two mountains on which there are castles.","img":"https://iiif.micr.io/oCoVK/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/oCoVK/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-348--dd72e2f7cba18af55d2e580404140286"},{"title":"Sandy Track in the Dunes","artist":"Jacob van Ruisdael","tag":"Paintings","date":"c. 1650 - c. 1655","medium":"oil on panel","dims":"height 32 cm x width 42.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"A sandy track winds along a dune, at the top of which two people enjoy the view. Ruisdael linked various visual elements together, from the reeds in the foreground to the horizon in the distance. The curve of the path is continued visually in the treetops. In this juvenile work, Ruisdael was already exploring ways of enhancing the palpability of a landscape.","img":"https://iiif.micr.io/WOpGx/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/WOpGx/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-562--e4f4bf5a71c18887fae2601e52447086"},{"title":"Winter Landscape","artist":"Jacob van Ruisdael","tag":"Paintings","date":"c. 1665","medium":"oil on canvas","dims":"height 61.3 cm x width 69.1 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ruisdael painted around 25 winter landscapes. This scene is dominated by ominous dark clouds, and lit from the left by low, raking sunlight. The warmly dressed figures on the ice seem insignificant in the face of this inclement weather. A cheerful crowd of ice skaters would have been out of place in such a wintery landscape by Ruisdael.","img":"https://iiif.micr.io/LkJYZ/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/LkJYZ/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-349--c8efd9ed1004685d2aa5096d061d184c"},{"title":"Landscape with Waterfall","artist":"Jacob van Ruisdael","tag":"Paintings","date":"c. 1668","medium":"oil on canvas","dims":"height 142.5 cm x width 196 cm","loc":"Rijksmuseum, Amsterdam","desc":"The tiny figures in this grand landscape with a rushing waterfall are almost lost. The composition is dominated by gnarled trees, barren tree trunks, and roiling water. The dramatic cycle of nature’s birth and decay is almost tangible. A church tower rises up in the distance like a beacon of peace.","img":"https://iiif.micr.io/PDbGh/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/PDbGh/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-210--4dec9de2ceee62d80167471eaa1010ff"},{"title":"Bentheim Castle","artist":"Jacob van Ruisdael","tag":"Paintings","date":"1650 - 1682","medium":"oil on canvas","dims":"height 68 cm x width 54 cm","loc":"Rijksmuseum, Amsterdam","desc":"Bentheim Castle still exists. It is located on the German–Dutch border region, but the high mountains Ruisdael depicted in this painting are not found there. Fantasy and reality are interwoven in this scene. The painter made a dozen paintings of this castle, each with a different mountain landscape. In 1861, Goethe, the famous German writer, rightly called Ruisdael a poet.","img":"https://iiif.micr.io/KWwKS/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/KWwKS/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-347--9824cd76dc0155d058a0615a9549e9b7"},{"title":"Forest Scene","artist":"Jacob van Ruisdael","tag":"Paintings","date":"1653","medium":"oil on panel","dims":"depth 10.6 cm","loc":"Rijksmuseum, Amsterdam","desc":"Until the 1650s, Ruisdael’s landscapes were marked by dense groves. He was partial to gnarled, distinctive trees. Here, we see pollard willows at the right, and oaks next to them. The left foreground features a blooming lilac lining the path on which a herdsman drives his cattle. Ruisdael created depth by placing in the right foreground a bare pollard willow, accentuated by the erratic shape of its trunk and colour of its bark.","img":"https://iiif.micr.io/CNGHz/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/CNGHz/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-350--d3894a8822f2a287deff64ff32c70e44"},{"title":"The Ford","artist":"Jacob van Ruisdael","tag":"Paintings","date":"1650 - 1682","medium":"oil on canvas","dims":"height 67.5 cm x width 85 cm","loc":"Rijksmuseum, Amsterdam","desc":"Landscape with a forefront at the edge of a forest. Some riders ride through the water. At the front, children play and a coachman lets his horses drink from the water","img":"https://iiif.micr.io/nGzSp/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/nGzSp/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2337--2689008d36a6210537cf4656c1e047ad"},{"title":"Landscape with watermill","artist":"Jacob van Ruisdael","tag":"Paintings","date":"1661","medium":"oil on canvas","dims":"depth 10 cm","loc":"Rijksmuseum, Amsterdam","desc":"Landscape with water mill located on a road between trees. On the left a lake with swans, on the right a lumberjack.","img":"https://iiif.micr.io/zLXtD/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/zLXtD/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-213--87baae13da1fb7fba655e0a02727e242"},{"title":"Rocky landscape","artist":"Jacob van Ruisdael","tag":"Paintings","date":"1650 - 1682","medium":"oil on canvas","dims":"depth 10.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ruisdael moved from Haarlem to Amsterdam around 1656. There he expanded his repertoire of subjects with motifs such as waterfalls, rocks and half-timbered houses. He derived them from the work of Allaert van Everdingen, who had been in Sweden and Norway.","img":"https://iiif.micr.io/WSjZP/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/WSjZP/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-212--68e2804b92089bd962f6b889fe62bafb"},{"title":"Figures in a Courtyard behind a House","artist":"Pieter de Hooch","tag":"Paintings","date":"c. 1663 - c. 1665","medium":"oil on canvas","dims":"height 60 cm x width 45.7 cm","loc":"Rijksmuseum, Amsterdam","desc":"In the shelter of the shade, a woman squeezes the juice of a lemon into her glass, while her companion attempts to draw her attention. Perhaps she wants to keep a cool head: in the 17th century it was believed that lemons could calm intense infatuation. Two\r\nmaidservants bustle about: one is serving drinks, while the other is scrubbing a kettle.","img":"https://iiif.micr.io/SOvaQ/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/SOvaQ/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-150--dccb95544f474ee4a2fa7d5f9ba51cc0"},{"title":"A Maid with a Child in a Pantry","artist":"Pieter de Hooch","tag":"Paintings","date":"c. 1656 - c. 1660","medium":"oil on canvas","dims":"height 65 cm x width 60.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"A maidservant shows a little boy the contents of her jug. At that time, all children wore dresses with walking reins to hold onto them while they learned to walk. De Hooch was renowned for his views through one space to another. He depicted two here: one to the\r\ncellar and another to the front room, where he painted the daylight streaming in pure white.","img":"https://iiif.micr.io/DSKRH/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/DSKRH/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-182--e4df662eb6e409760ccb0c9d3884759d"},{"title":"Man Handing a Letter to a Woman in the Entrance Hall of a House","artist":"Pieter de Hooch","tag":"Paintings","date":"1670","medium":"oil on canvas","dims":"height 68 cm x width 59 cm","loc":"Rijksmuseum, Amsterdam","desc":"All the windows and doors of this canal house are open. Daylight falls on the lady of the house, who is receiving a letter. With lighting effects and figures, De Hooch leads our gaze outside. We follow the dog to the canal and to a child playing with a whip, and\r\nbeyond towards the sunny street on the opposite side. The view continues through the gate on the right.","img":"https://iiif.micr.io/YEDXA/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/YEDXA/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-147--4e3ade8bd905ea05d23828f81cc8bda2"},{"title":"A Mother Delousing her Child’s Hair, Known as ‘A Mother’s Duty’","artist":"Pieter de Hooch","tag":"Paintings","date":"c. 1660 - c. 1661","medium":"oil on canvas","dims":"height 52.5 cm x width 61 cm","loc":"Rijksmuseum, Amsterdam","desc":"A mother thoroughly inspects her child’s head for lice. She pursues her task in a sober Dutch interior, with Delft blue tiles and a box bed. In the right foreground is a ‘kakstoel’, or potty chair. Through the doorway is a glimpse of a sunny back room and a garden. De Hooch specialized in such ‘through-views’.","img":"https://iiif.micr.io/SgpJY/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/SgpJY/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-149--a04f41193ef4a71d4a242e7b831ca0e4"},{"title":"Interior with Women beside a Linen Cupboard","artist":"Pieter de Hooch","tag":"Paintings","date":"1663","medium":"oil on canvas","dims":"height 70 cm x width 75.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"The sun lights up the canal houses outside, while in the darker interior a girl plays ‘kolf,’ a kind of hockey. Two women stack freshly pressed linen in a closet. The linen cupboard had an important place in the home. The lady of the house carried its key with her and ‘handed out the sheets’: she called the shots and was in charge of the household.","img":"https://iiif.micr.io/NYvCK/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/NYvCK/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-1191--50874e6f82c7190c896320bf39c7f4c9"},{"title":"Helena van der Schalcke","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"c. 1648","medium":"oil on panel","dims":"height 59 cm x width 52 cm","loc":"Rijksmuseum, Amsterdam","desc":"Helena van der Schalck, a merchant's daughter was no more than three years old when she was portrayed here. Her silk dress adorned with bows and her straw purse resemble adult attire. However, just visible on her back is a bit of her walking reins, used to keep children safe. The red carnation in her hand symbolizes hope for eternal life. Sadly, Helena died at the age of 24.","img":"https://iiif.micr.io/HUjVm/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/HUjVm/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1786--afe781ab16974c11bcb26b5bdbdbb5cd"},{"title":"Portrait of Johanna Bardoel (d. after 1667)","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1644","medium":"oil on panel","dims":"height 29.5 cm x width 23.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Johanna Bardoel (died after 1667), married to Gerard van der Schalcke. Kneepiece, standing with a glove in the right hand. Pendant of SK-A-1784.","img":"https://iiif.micr.io/vnkjW/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/vnkjW/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1785--36fd2d9a30f9d16176f0c42d4958ef94"},{"title":"Portrait of Gerard Abrahamsz van der Schalcke (1609-1667)","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1644","medium":"oil on panel","dims":"height 29.5 cm x width 23.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Gerard Abrahamsz van der Schalcke, cloth merchant in Haarlem, married to Johanna Bardoel. Knee piece, glove in the left hand. Pendant of SK-A-1785.","img":"https://iiif.micr.io/dcwVS/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/dcwVS/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1784--b1545c1ef740aafe9bfa3fcf0c6ac46d"},{"title":"Woman in Peasant Costume","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"c. 1650 - c. 1660","medium":"oil on panel","dims":"height 28 cm x width 23 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ter Borch probably depicted his half-sister Gesina ter Borch here. She, too, was an artist, and frequently modelled for him. In the 17th century, her appearance, with her gathered plaits and a red hairband, would immediately identify her as an unmarried country girl. She is holding a printed sheet of paper, from which she briefly glances up.","img":"https://iiif.micr.io/fwFsx/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/fwFsx/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4038--c5c3ddffa03865399782ffa78f2dc4fd"},{"title":"Woman at a Mirror","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"c. 1652","medium":"oil on panel","dims":"height 34.5 cm x width 26 cm","loc":"Rijksmuseum, Amsterdam","desc":"A young boy holds up a mirror for the woman in the satin gown, who gazes upward at a far more plainly dressed woman. In the 17th century, mirrors symbolized vanity and the transience of life. This painting serves as a cautionary reminder: youth and beauty are fleeting. Ter Borch’s sister, Gesina, also an artist, probably modelled for both women, and his brother Moses for the boy.","img":"https://iiif.micr.io/hXWwz/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/hXWwz/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4039--8791912c6a41ba132fc543660ef1f9d9"},{"title":"Gallant Conversation, Known as ‘The Paternal Admonition’","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"c. 1654","medium":"oil on canvas","dims":"height 71 cm x width 73 cm","loc":"Rijksmuseum, Amsterdam","desc":"The standing woman is receiving two guests. The man seems to have just arrived, as he still holds his hat in his hand. Ter Borch excelled in accurately rendering fabrics, such as the satin dress. Furthermore, he favoured ambiguous scenes, whereby the sentiments\r\nof his figures are difficult to determine. Here, too, the reason behind the gathering remains enigmatic.","img":"https://iiif.micr.io/RxOuM/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/RxOuM/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-404--c7e6ee5e46db1ef891d311eff9f9b27e"},{"title":"Portret van François de Vicq (1646-1707)","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1670","medium":"oil on canvas","dims":"depth 10.4 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of François de Vicq, mayor of Amsterdam several times since 1697. Knee piece, standing at a table with his hat on it. In the left hand a walking stick. Pendant of SK-A-2418.","img":"https://iiif.micr.io/MVYdt/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/MVYdt/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2417--5f8ec9152c8205bd9fba32821245fe75"},{"title":"Portret van Aletta Pancras (1649-1707)","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1670","medium":"oil on canvas","dims":"height 38.5 cm x width 31 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Aletta Pancras (1649-1707), standing at a table. Pancras married François de Vicq in 1667 (see counterpart SK-A-2417).","img":"https://iiif.micr.io/LyMwd/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/LyMwd/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2418--ef40e4fb858932bee3bdb8cea9022bde"},{"title":"Godard van Reede (1588-1648), Lord of Nederhorst. Delegate of the Province of Utrecht at the Peace Conference at Münster (1646-48)","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1646 - 1648","medium":"oil on copper","dims":"height 14.5 cm x width 11 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Godard van Reede, lord of Nederhorst. Plenipotentiary of the province of Utrecht at the peace negotiations in Munster. Bust.","img":"https://iiif.micr.io/eJYvW/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/eJYvW/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3842--0398cc8a9b13fc1e05657ed1e9bf14c7"},{"title":"Portrait of a Man","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1640 - 1681","medium":"oil on copper","dims":"height 35.5 cm x width 29.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of a man, halfway with the hat in his hand. Pendant of SK-A-403.","img":"https://iiif.micr.io/UVHHx/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/UVHHx/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-402--e585814715513f11e7a88d73d2b60c7f"},{"title":"Portrait of a Woman","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1640 - 1681","medium":"oil on copper","dims":"height 35.5 cm x width 29.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of a woman. Halfway through, a fan in hand. Pendant of SK-A-402.","img":"https://iiif.micr.io/LVVkP/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/LVVkP/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-403--d71f4901b1d8a7bc7e58e90f5dfa40b7"},{"title":"Jacob de Graeff (1642-90). In the Uniform of an Officer","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1670 - 1681","medium":"oil on panel","dims":"height 52.5 cm x width 34.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"In addition to interior scenes, Gerard ter Borch mainly painted portraits. One of their clients was Jacob de Graeff, regent of the Amsterdam orphanage. De Graeff is dressed as an officer. His sword hangs on a fur-trimmed belt around his shoulder.","img":"https://iiif.micr.io/sYDJc/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/sYDJc/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3963--5dfb9ed7d1508fbf8e3203fc6b7f70a5"},{"title":"The Ratification of the Treaty of Münster","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1648","medium":"oil on copper","dims":"height 45.4 cm x width 58.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"This depicts an exceptionally important historical moment: when the Dutch and Spanish ratified a peace treaty ending a war that had lasted 80 years. The event took place on 15 May 1648 in the town hall of the\r\nGerman city of Münster. The Dutch delegates are at the left, the Spanish ones at the right. Before them on the table are two copies of the treaty, which were placed in the little chests and delivered to Madrid and The Hague.","img":"https://iiif.micr.io/lPJJy/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/lPJJy/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-1683--e60c0795fb382742305dce66375a935d"},{"title":"Memorial Portrait of Moses ter Borch","artist":"Gerard ter Borch the Younger","tag":"Paintings","date":"1667 - 1669","medium":"oil on canvas","dims":"height 76.2 cm x width 56.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Moses died in 1667 during the storming of Fort Languard near Felixstowe in England. Not long thereafter Gerard and Gesina painted this picture in memory of their youngest brother. Gerard painted Moses’ portrait, Gesina the background and the objects. These allude to Moses’ heroic death and the transience of life, such as time (the pocket watch), death (the skull), eternity (ivy on the rocks) and loyalty (the dogs).","img":"https://iiif.micr.io/vCGOX/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/vCGOX/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4908--7b421ca0f67138db1bf1012312cb6892"},{"title":"Portrait of Willem Pottey, Lawyer and Accountant-General of Flushing","artist":"Nicolaes Maes","tag":"Paintings","date":"1686 - 1693","medium":"oil on canvas","dims":"height 61 cm x width 49 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Willem Pottey, lawyer and accountant-general in Vlissingen. Kneepiece, standing next to a column, gesturing with the left hand. Pendant of SK-A-1646.","img":"https://iiif.micr.io/qRUAw/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/qRUAw/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1645--1c296369284db22f98aec1ea087e3180"},{"title":"Cornelis Evertsen, Lieutenant-Admiral of Zeeland","artist":"Nicolaes Maes","tag":"Paintings","date":"1680","medium":"oil on canvas","dims":"height 148 cm x width 124 cm","loc":"Rijksmuseum, Amsterdam","desc":"Cornelis Evertsen the Youngest (1642–1706) came from a true seafaring family. Like him, his father and uncle were both lieutenant-admirals. All three served the Admiralty of Zeeland, an important part of the Dutch navy. Evertsen was also a fervent supporter of the House of Orange, as his sash reveals. The cannon and the naval battle scene refer to his professional career.","img":"https://iiif.micr.io/moChn/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/moChn/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1662--cf5218af1086e55bcb755e963bc67783"},{"title":"Old Woman Saying Grace, Known as ‘The Prayer without End’","artist":"Nicolaes Maes","tag":"Paintings","date":"c. 1656","medium":"oil on canvas","dims":"height 134 cm x width 113 cm","loc":"Rijksmuseum, Amsterdam","desc":"An old woman prays devoutly before eating her meal. She does not let the begging cat tugging impatiently on the tablecloth distract her. The vir
