it":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4908--7b421ca0f67138db1bf1012312cb6892"},{"title":"Portrait of Willem Pottey, Lawyer and Accountant-General of Flushing","artist":"Nicolaes Maes","tag":"Paintings","date":"1686 - 1693","medium":"oil on canvas","dims":"height 61 cm x width 49 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Willem Pottey, lawyer and accountant-general in Vlissingen. Kneepiece, standing next to a column, gesturing with the left hand. Pendant of SK-A-1646.","img":"https://iiif.micr.io/qRUAw/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/qRUAw/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1645--1c296369284db22f98aec1ea087e3180"},{"title":"Cornelis Evertsen, Lieutenant-Admiral of Zeeland","artist":"Nicolaes Maes","tag":"Paintings","date":"1680","medium":"oil on canvas","dims":"height 148 cm x width 124 cm","loc":"Rijksmuseum, Amsterdam","desc":"Cornelis Evertsen the Youngest (1642–1706) came from a true seafaring family. Like him, his father and uncle were both lieutenant-admirals. All three served the Admiralty of Zeeland, an important part of the Dutch navy. Evertsen was also a fervent supporter of the House of Orange, as his sash reveals. The cannon and the naval battle scene refer to his professional career.","img":"https://iiif.micr.io/moChn/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/moChn/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1662--cf5218af1086e55bcb755e963bc67783"},{"title":"Old Woman Saying Grace, Known as ‘The Prayer without End’","artist":"Nicolaes Maes","tag":"Paintings","date":"c. 1656","medium":"oil on canvas","dims":"height 134 cm x width 113 cm","loc":"Rijksmuseum, Amsterdam","desc":"An old woman prays devoutly before eating her meal. She does not let the begging cat tugging impatiently on the tablecloth distract her. The virtue of the old woman lies in her self-control and sense of duty to God. Just like his teacher Rembrandt, Maes focuses attention on the essence of the scene through restricted lighting.","img":"https://iiif.micr.io/yorZz/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/yorZz/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-535--c5fa6b87598aa1777679077a46c1db5f"},{"title":"Portrait of a young man, possibly Simon van Alphen (1650-1730)","artist":"Nicolaes Maes","tag":"Paintings","date":"1675 - 1685","medium":"oil on canvas","dims":"depth 4.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of a young man from the Van Alphen family, probably Simon van Alphen. Knee piece, leaning against a tree. Signed with the left hand, the right hand in the side. In the background, a landscape with a waterfall.","img":"https://iiif.micr.io/MvumA/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/MvumA/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4881--c462a1b0b2a2ed572a17512bd36b7b1a"},{"title":"Gerard Röver, Merchant and Shipowner in Amsterdam","artist":"Nicolaes Maes","tag":"Paintings","date":"1675 - 1693","medium":"oil on canvas","dims":"height 44.5 cm x width 33.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Belichje Hulft, wife of Gerard Röver, merchant and shipowner in Amsterdam. Bust in oval, in the background a wooded landscape.","img":"https://iiif.micr.io/RtNES/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/RtNES/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1259--ba4c5018e78710f81a742789e404ccbf"},{"title":"Portrait of Catharina Pottey, Sister of Willem and Sara Pottey","artist":"Nicolaes Maes","tag":"Paintings","date":"1661 - 1693","medium":"oil on canvas","dims":"height 61 cm x width 49 cm","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of Catharina Pottey, sister of Willem and Sara Pottey. Knee piece, sitting with the right arm leaning on a table on which there is a rose. In the background a landscape. Pendant of SK-A-1645.","img":"https://iiif.micr.io/aWhqJ/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/aWhqJ/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1646--fabd254745602130f37a2661d5ec6286"},{"title":"Vegetable Market","artist":"Nicolaes Maes","tag":"Paintings","date":"1655 - 1665","medium":"oil on canvas","dims":"height 71 cm x width 91 cm","loc":"Rijksmuseum, Amsterdam","desc":"Vegetable market. A group of people around a stall on a bridge where an old woman sells vegetables. Large coals are piled up in a basket, large forests of carrots or turnips lie on a wheelbarrow. On the left, a mother with a child on her arm and a maid with a basket. On the right, a woman with two children and a dog.","img":"https://iiif.micr.io/nGnYh/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/nGnYh/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3254--5c6b229aa4de2baf3f6d96183503b550"},{"title":"Old Woman Spinning","artist":"Nicolaes Maes","tag":"Paintings","date":"1650 - 1660","medium":"oil on canvas","dims":"height 63 cm x width 55 cm","loc":"Rijksmuseum, Amsterdam","desc":"We do not know any paintings with domestic scenes by Rembrandt. His pupil Nicolaes Maes, on the other hand, painted many virtuous women who are busy in the house. An old woman spins wool here. She has retreated into the corner of a room, where the last remnant of daylight falls. Maes took over this method of lighting from his teacher.","img":"https://iiif.micr.io/Mhtpz/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/Mhtpz/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-246--e0a9c6ada2a11008f3375301bc24df4f"},{"title":"Woman at a Cradle","artist":"Nicolaes Maes","tag":"Paintings","date":"1652 - 1662","medium":"oil on canvas","dims":"height 33.8 cm x width 28.8 cm","loc":"Rijksmuseum, Amsterdam","desc":"Has the baby fallen asleep yet? A woman carefully lifts the cloth draped over the cradle. Her book of verses rests in her lap. The fall of light and warm red hues of the blanket draw attention to the woman with her child. Maes heightened the intimacy of this scene by incorporating a drawn-back curtain at the right.","img":"https://iiif.micr.io/UjhHA/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/UjhHA/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4047--4c71b1f974c9b9b1ffa696cab7587086"},{"title":"Girl at a Window, known as ‘The Daydreamer’","artist":"Nicolaes Maes","tag":"Paintings","date":"1650 - 1660","medium":"oil on canvas","dims":"height 123 cm x width 96 cm","loc":"Rijksmuseum, Amsterdam","desc":"Figures leaning out of the window were a popular subject in the 17th century. Here, a thought-submerged young girl stares out the window, which is surrounded by apricot vines. Her face and hands stand out brightly against the dark background. Maes learned this light-dark contrast from his master Rembrandt. The warm red is characteristic of Maes' work itself.","img":"https://iiif.micr.io/YPwTs/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/YPwTs/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-245--594d21ece0f7af9872f9050289e0a6f9"},{"title":"De spinster","artist":"Nicolaes Maes","tag":"Paintings","date":"1652 - 1662","medium":"oil on panel","dims":"height 41.5 cm x width 33.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"We do not know any paintings with domestic scenes by Rembrandt. His pupil Nicolaes Maes, on the other hand, painted many virtuous women who are busy in the house. An old woman spins wool here. She has retreated into the corner of a room, where the last remnant of daylight falls. Maes took over this method of lighting from his teacher.","img":"https://iiif.micr.io/msBPv/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/msBPv/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-176--a028c177b561fee7b7251ace01f8e8c6"},{"title":"Portrait of Pieter Groenendijk","artist":"Nicolaes Maes","tag":"Paintings","date":"1677 - 1685","medium":"oil on canvas","dims":"height 69.2 cm x width 57.8 cm x depth 8.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Pieter Groenendijk was an official in the Leiden city government. When he married Petronella Dunois of Amsterdam, she moved into his home and brought her dolls’ house with her. After the couple’s death, the dolls’ house went to their heirs and subsequently passed down the female line until it was acquired by the Rijksmuseum.","img":"https://iiif.micr.io/gnqAd/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/gnqAd/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4888--229813c619b63048db805c652e023bff"},{"title":"Portrait of Petronella Dunois","artist":"Nicolaes Maes","tag":"Paintings","date":"1677 - 1685","medium":"oil on canvas","dims":"height 69.2 cm x width 57.8 cm","loc":"Rijksmuseum, Amsterdam","desc":"Petronella Dunois meticulously assembled the dolls’ house displayed here at the right. She commissioned various craftsmen to create each component. When she wed Pieter Groenendijk, her dolls’ house was one of the most valuable possessions she brought into the marriage, alongside customary assets such as securities and an impressive amount of linen","img":"https://iiif.micr.io/cBFUO/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/cBFUO/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-4889--d4878ad23ee1f3bb597ad287f02b440e"},{"title":"Orpheus and the Animals","artist":"Paulus Potter","tag":"Paintings","date":"1650","medium":"oil on canvas","dims":"height 67 cm x width 89 cm","loc":"Rijksmuseum, Amsterdam","desc":"The Classical poet Ovid described how Orpheus en-chanted nature with his wonderful lyre music. This theme was popular among 17th-century animal painters because it gave them a chance to depict many different sorts of animals. Here Potter demonstrates that his repertoire encompassed more than the usual farm animals. He painted dozens of native and exotic beasts. In the middle Orpheus is strumming his harp.","img":"https://iiif.micr.io/yovsf/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/yovsf/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-317--b1840cea974838391bcea8dc9e65cf0a"},{"title":"Cows in a Meadow near a Farm","artist":"Paulus Potter","tag":"Paintings","date":"1653","medium":"oil on canvas","dims":"height 58 cm x width 66.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Paulus Potter favoured painting animals in the countryside and at farms. He rendered the typical Dutch\r\nlandscape – the pollard willows, the meadow, and the pond in the background –with great precision. In this painting the sun hangs low, calling to mind the late afternoon, when the languid cows and sheep take their rest.","img":"https://iiif.micr.io/ynTUE/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ynTUE/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-711--bf741246f31d875293d1033646a53ef7"},{"title":"A Spaniel","artist":"Paulus Potter","tag":"Paintings","date":"1653","medium":"oil on panel","dims":"depth 9.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"A partridge dog, in the background a landscape with a hunter on horseback with dogs.","img":"https://iiif.micr.io/dyWQL/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/dyWQL/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-279--215b5344663ad3c567d1f64ccffad838"},{"title":"A Herdsman's hut","artist":"Paulus Potter","tag":"Paintings","date":"1645","medium":"oil on panel","dims":"height 24.7 cm x width 32 cm x height 23.4 cm x width 29.2 cm","loc":"Rijksmuseum, Amsterdam","desc":"A shepherd's hut between trees. In front of the hut there is a shepherd among the cattle; sheep and a calf.","img":"https://iiif.micr.io/uSJLT/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/uSJLT/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-315--8a9afeb772e0621cd90cad3eb9c5c741"},{"title":"Four Young Bulls in a Meadow","artist":"Paulus Potter","tag":"Paintings","date":"1651","medium":"oil on panel","dims":"height 25 cm x width 30.1 cm x depth 1.1 cm","loc":"Rijksmuseum, Amsterdam","desc":"Paulus Potter was the first painter to give Dutch cattle a leading role in his work. In this painting, four young bulls\r\nstand out sharply against a cloudy grey sky. Their heavy bodies cast dark shadows. The sinewy animals appear even more impressive because of Potter’s low vantage point.","img":"https://iiif.micr.io/PRLug/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/PRLug/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-206--32aec3ddd2a85f611fe0ab433ad42a23"},{"title":"Two Horses in a Meadow near a Gate","artist":"Paulus Potter","tag":"Paintings","date":"1649","medium":"oil on panel","dims":"height 23.3 cm x width 29.6 cm x depth 0.9 cm","loc":"Rijksmuseum, Amsterdam","desc":"Two horses stand on a little rise before a sweeping meadow landscape with cattle. The town of Delft is\r\nvisible in the distance. The animals’ fluttering tails and manes, and the low-lying clouds, signal that the\r\nweather is raw and windy. Potter enhances the liveliness of the depiction by placing the grey horse before\r\na dark boscage and the chestnut horse before a light, cloud-filled sky.","img":"https://iiif.micr.io/JFBTc/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/JFBTc/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-205--caf01eccce9af353e8be5aba7191fba7"},{"title":"Bear Hunt","artist":"Paulus Potter","tag":"Paintings","date":"1649","medium":"oil on canvas","dims":"height 305 cm x width 338 cm","loc":"Rijksmuseum, Amsterdam","desc":"The bear hunt. A bear in a ferocious fight with a pack of hunting dogs, a hunter on horseback with a drawn sword on the left. On the right, a bear flees into a tree.","img":"https://iiif.micr.io/VwJhU/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/VwJhU/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-316--4b5c6adf82a6525d86ba592425a1ad22"},{"title":"Portrait of a Young Man, possibly Jacob Francken (1627-after 1656)","artist":"Aelbert Cuyp","tag":"Paintings","date":"c. 1651","medium":"oil on panel","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"Portrait of a young man. Bust with a feathered beret on the head, in the left hand he holds the barrel of a gun.","img":"https://iiif.micr.io/aRoEK/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/aRoEK/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-120--d2e667e57809d4aa8e21754468870879"},{"title":"Encounter during the Battle of Kijkduin","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1675","medium":"oil on canvas","dims":"height 114 cm x width 183 cm","loc":"Rijksmuseum, Amsterdam","desc":"This painting is traditionally called the Nocturnal Battle. However, the naval battle at Kijkduin, between Cornelis Tromp on the Gouden Leeuw and Sir Edward Spragg on the Royal Prince, actually took place in daylight hours on 21 August 1673. It looks like night only because the encounter is shown partially hidden behind clouds of smoke and gunpowder fumes. While the Dutch flagship is sinking at the right, Tromp\r\nbattles on from a captured ship.","img":"https://iiif.micr.io/FUmRx/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/FUmRx/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-2393--8fc367ec0235e4bfc0710b370daad2cf"},{"title":"The Capture of the Royal Prince","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1670","medium":"oil on canvas","dims":"depth 6.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"On 13 June 1666, the third day of the Four Days’ Battle, the English flagship the Royal Prince ran aground on a sandbank off the English coast. It was then captured by Cornelis Tromp, who transferred its crew to his vessel, the Gouda (at left). Admiral de Ruyter commanded Tromp to burn this prize. He would have preferred to tow it back to the Netherlands in triumph.","img":"https://iiif.micr.io/YtpJy/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/YtpJy/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-438--3ebf42d255a8f6b124f902815893d27a"},{"title":"A Ship on the High Seas Caught by a Squall, Known as ‘The Gust’","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1680","medium":"oil on canvas","dims":"height 77 cm x width 63.5 cm x height 90.5 cm x width 78.5 cm x depth 6.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"This large, 70-gun British warship is in distress. A fierce gust of wind has broken one of its masts, and a sail has come loose. In 1672, Willem van de Velde II, together with his father, who was also a marine painter, entered the service of the English court. He made this painting and its companion, The Cannon Shot, in England.","img":"https://iiif.micr.io/eBrWZ/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/eBrWZ/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1848--10ab6e851c892e484d4ad0ee96f78b37"},{"title":"The Cannon Shot","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1680","medium":"oil on canvas","dims":"height 78.5 cm x width 67 cm x height 90.8 cm x width 80.5 cm x depth 7.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"A Dutch warship in a calm, with its sails loosed, fires a cannon shot. Two sloops float to either side of the man-of-war, and another Dutch ship with lowered sails can be seen in the distance.","img":"https://iiif.micr.io/GnNNF/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/GnNNF/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-244--0c987a7942d3809625b09d0e175ef1bf"},{"title":"Captured English Ships after the Four Days’ Battle","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1666","medium":"oil on canvas","dims":"height 58 cm x width 81 cm","loc":"Rijksmuseum, Amsterdam","desc":"Battered English and Dutch ships lie in Goeree Gat after the indecisive engagement known as the Four Days’ Battle (11–14 June 1666). In the foreground is the captured warship the Swiftsure, with the English royal arms on its counter. Its bowsprit, foremast and main mast have been splintered by cannon fire; the English flag droops off its stern. At the far right is the Hollandia, the heavily damaged ship of Cornelis Tromp.","img":"https://iiif.micr.io/FMqLL/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/FMqLL/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-439--0ccc2460c333399c3635929395363d1a"},{"title":"Ships near the Coast during a Calm","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1650 - c. 1707","medium":"oil on panel","dims":"depth 6.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ships off the coast during no wind. In the foreground near land are two fishing boats, on the right a warship.","img":"https://iiif.micr.io/XTnue/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/XTnue/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-722--91a4119c600995daff72e74bb87eccdf"},{"title":"\"Naval Battle between Michiel Adriaenszoon de Ruyter and the Duke of York on the \"\"Royal Prince\"\" during the Battle of Solebay, 7 June 1672:  episode from the Third Anglo-Dutch War\"","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"1691","medium":"oil on canvas","dims":"height 112 cm x width 182 cm","loc":"Rijksmuseum, Amsterdam","desc":"The battle of Michiel Adriaenszoon de Ruyter against the Duke of York on the 'Royal Prince' during the naval battle of Solebay, 7 June 1672: episode from the Third English Sea War (1672-74). The English ship sails in the middle, without the upper part of the mast. A few small ships sail around this ship.","img":"https://iiif.micr.io/aYfaE/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/aYfaE/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1716--cd6030197e43674de5607b7dc227bc6d"},{"title":"A Harbor","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"1650 - 1707","medium":"oil on panel","dims":"depth 4.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Harbour view. A barge and a few rowing boats at a harbour head, in the distance there is a warship at anchor.","img":"https://iiif.micr.io/pLDNa/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/pLDNa/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-437--5f91c6acbbcc8fbc16e0ea5daed5ce9b"},{"title":"A Calm at Sea","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"1650 - 1707","medium":"oil on canvas","dims":"depth 7 cm","loc":"Rijksmuseum, Amsterdam","desc":"Windlessness. A State yacht with a large banner and other smaller and larger ships in calm water near land. A full sloop comes along the side of the yacht. In the foreground some men in a fishing boat.","img":"https://iiif.micr.io/PLgKk/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/PLgKk/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-436--a05777b594d789c237ff574cf3fe160d"},{"title":"Ships near the Coast in windy Weather","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1650 - c. 1707","medium":"oil on panel","dims":"height 28.7 cm x width 37 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ships off the coast in strong breezes. On the left is a harbour head, on the water there are some smaller barges and sloops, in the distance there are larger ships at anchor.","img":"https://iiif.micr.io/vaXES/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/vaXES/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-723--9a4418f854a443dffdc8388ae74f85c7"},{"title":"Fishing Boats on Shore (The Shore, Unloading a Fishing Smack)","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"1650 - 1707","medium":"oil on canvas","dims":"depth 6.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Fishing boats on the beach. Coastal landscape with some fishing vessels on the beach. On the front right a group of fishermen at an anchor and a rowboat, on the left a man with a scoop net. To the right the dunes of the coast.","img":"https://iiif.micr.io/bATHW/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/bATHW/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-247--8939c51a1f668a493dfbc9f27445a471"},{"title":"Ships at Anchor on the Coast","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1660","medium":"oil on canvas","dims":"depth 7 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ships under the coast at anchor, with in the foreground an admiralty ship with the painter's initials ('W.v.V.') on the white runway of the Dutch flag on the stern. Behind it a whistle ship. Left and right small cargo ships, a mirror yacht and rowing boats.","img":"https://iiif.micr.io/ouMhG/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/ouMhG/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-245--b7735b55521c1933c2214f1badae6b6d"},{"title":"Ships before the Coast","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"after 1670","medium":"oil on panel","dims":"height 42 cm x width 46 cm","loc":"Rijksmuseum, Amsterdam","desc":"In the 17th century painters specialized in specific genres. For instance, Willem van de Velde became a marine painter, perhaps even the most successful one ever. He portrayed large, spectacular naval battles as well as small, tranquil coastal views, like we see here. Modest commercial vessels lie still on the smooth-as-glass surface of the water. Somewhat further back in the middle ground are two warships calmly awaiting what is to come.","img":"https://iiif.micr.io/YUeqS/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/YUeqS/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-440--d56f773f52ed1bfa3373ed915e924e4d"},{"title":"Dutch Ships in a Calm Sea","artist":"Willem van de Velde the Younger","tag":"Paintings","date":"c. 1665","medium":"oil on canvas","dims":"height 86.8 cm x width 120 cm","loc":"Rijksmuseum, Amsterdam","desc":"A few warships in a calm sea: their sails are being hoisted, their anchors raised. The small squadron is getting ready to depart. A sloop with dignitaries rows past the ships, to the sounding of trumpets and firing of salutes. Already in 1778, this painting was described in a sales\r\ncatalogue as being exceptional: ‘one of the best gems by this outstanding marine painter.’","img":"https://iiif.micr.io/LncYK/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/LncYK/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-1707--c726c1d696aa0f30815f174a8f4fb646"},{"title":"Interior of the Church of St Bavo in Haarlem","artist":"Pieter Jansz Saenredam","tag":"Paintings","date":"1636-04-15","medium":"oil on panel","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"Saenredam specialized in architectural painting. He studied buildings closely, making detailed drawings of them, which he then reworked into paintings. Here he chose a vantage point from behind an arch, which creates a second framing element. Our gaze is automatically drawn upwards to the old organ, which has a painted scene of the Resurrection of Christ. This is a remnant of the by-then long-abolished Catholic\r\ndecoration.","img":"https://iiif.micr.io/DVZRG/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/DVZRG/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-359--3f4dc96d988ead2f72f49799e77bb332"},{"title":"The Nave and Choir of the Mariakerk in Utrecht","artist":"Pieter Jansz Saenredam","tag":"Paintings","date":"1641-01-29","medium":"oil on panel","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"In the young Dutch Republic only Reformed Protestant services were still held in the former Catholic churches. Statues and paintings of saints were prohibited. The 11th-century Mariakerk preserved the decorations of the piers, which Saenredam here rendered in great detail – even applying gold leaf. At the left visitors look at an image of a bull on one of the piers: according to legend, this column continued to sink during\r\nconstruction until it was grounded on a bull’s hide.","img":"https://iiif.micr.io/oYVBj/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/oYVBj/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-851--946fa2be864f63ecaf84861e4e46b551"},{"title":"Interior of the Sint-Odulphuskerk in Assendelft","artist":"Pieter Jansz Saenredam","tag":"Paintings","date":"1649-10-02","medium":"oil on panel","dims":"width 75 cm","loc":"Rijksmuseum, Amsterdam","desc":"Bright, clear light fills this church, in which – as it happens – a sermon is being preached from the pulpit. Saenredam created a sense of space with his consistent use of perspective, in which all the orthogonal lines converge at the same point. This church was special to the painter: not only was he born in Assendelft, but the gravestone of his father, Jan Saenredam, bearing an inscription, can be seen in the right foreground.","img":"https://iiif.micr.io/fjTNG/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/fjTNG/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-217--ece748ca3c45cc2167022acebca268ca"},{"title":"The Old Town Hall of Amsterdam","artist":"Pieter Jansz Saenredam","tag":"Paintings","date":"1657","medium":"oil on panel","dims":"width 84.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Saenredam based this painting on a drawing he had made sixteen years earlier. On the step of the portico, he noted that the dilapidated town hall had in the meantime been destroyed by fire and replaced by a new monumental one (now the Palace on Dam Square). From 1658 this painting hung in the stately chamber\r\nof the mayors in the new Town Hall as a memento of the old building.","img":"https://iiif.micr.io/xgUtS/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/xgUtS/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-1409--1561063abe285d09ccdc66ed07029ec0"},{"title":"The Transept of the Mariakerk in Utrecht, Seen from the Northeast","artist":"Pieter Jansz Saenredam","tag":"Paintings","date":"1637","medium":"oil on panel","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"The transept of the Mariakerk in Utrecht, seen from the northeast. In the foreground some visitors and crippled beggars.","img":"https://iiif.micr.io/vbBDs/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/vbBDs/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-858--b4ddb490047c4407f62d16a8ff44965f"},{"title":"The Westernmost Bays of the South Aisle of the Mariakerk in Utrecht","artist":"Pieter Jansz Saenredam","tag":"Paintings","date":"c. 1640 - c. 1645","medium":"oil on panel","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"View in the western bays of the southern nave of the Mariakerk in Utrecht. At the window, three men have a chat.","img":"https://iiif.micr.io/dEmKt/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/dEmKt/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1189--92d2639f2b47e099853dceed6792c91f"},{"title":"Ice-Skating in a Village","artist":"Hendrick Avercamp","tag":"Paintings","date":"c. 1610","medium":"oil on panel","dims":"width 70.4 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ice cream fun at a village. Village view in winter with many figures skating, playing and pumping on the ice. On the left, two people have fallen through the ice. In the distance a drawbridge and a mill.","img":"https://iiif.micr.io/NafaR/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/NafaR/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1320--c89ea84ad5962999b6f7db9dbda7df4e"},{"title":"Winter Landscape with Ice Skaters","artist":"Hendrick Avercamp","tag":"Paintings","date":"c. 1608","medium":"oil on panel","dims":"width 131.9 cm","loc":"Rijksmuseum, Amsterdam","desc":"The high vantage point of this painting turns it into a sampler of human – and animal – activity during a harsh winter. Hundreds of people are out on the ice, most of them for pleasure, others working out of dire necessity. Avercamp did not shy away from grim details: in the left foreground crows and a dog feast on the carcass of a horse that has frozen to death.","img":"https://iiif.micr.io/aXnzA/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/aXnzA/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1718--918895dc18da94e357c6763adda8882f"},{"title":"Enjoying the Ice","artist":"Hendrick Avercamp","tag":"Paintings","date":"c. 1610 - c. 1620","medium":"oil on panel","dims":"width 37.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"Ice cream fun. On a frozen water near a castle, numerous figures entertain themselves with ice skates and pumping games.","img":"https://iiif.micr.io/WwEzP/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/WwEzP/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3247--fa7712d894d8843ae6b8b2bc8716d4e9"},{"title":"Enjoying the Ice near a Town","artist":"Hendrick Avercamp","tag":"Paintings","date":"c. 1620","medium":"olieverf op doek, gelijmd op paneel","dims":"height 47 cm x width 89 cm","loc":"Rijksmuseum, Amsterdam","desc":"A beggar tries to scrounge a bit of money, and another man has cut a hole in the ice in the hope of catching\r\nfish. The needy have to toil to make a living; those who are better off amuse themselves on the ice: and the richest of all – in the right foreground – look on. A few well-to-do ladies wear velvet masks to protect the delicate skin around their eyes from the cold.","img":"https://iiif.micr.io/CCoww/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/CCoww/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-1705--368e399771917717acdad5c160dfe747"},{"title":"Portrait of Joris van Egmond","artist":"Jan van Scorel","tag":"Paintings","date":"c. 1535 - c. 1540","medium":"oil on panel","dims":"width 80.8 cm","loc":"Rijksmuseum, Amsterdam","desc":"From the inscription on the original frame, we know that this is a portrait of the nobleman Joris van Egmond. He found favour with Emperor Charles V and in 1535 became Bishop of Utrecht. Van Egmond was an important patron to artists, including Van Scorel, who painted his protector on a panel of exceptionally wide format.","img":"https://iiif.micr.io/wYOLd/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/wYOLd/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-C-1618--d86906515aeedba6d38571c91177979e"},{"title":"Mary Magdalene","artist":"Jan van Scorel","tag":"Paintings","date":"c. 1530","medium":"oil on panel","dims":"height 86.5 cm x width 96 cm","loc":"Rijksmuseum, Amsterdam","desc":"Mary Magdalene can be recognized by the jar of ointment in her hands with which she cared for Jesus’ feet following her conversion to Christianity. She is usually depicted as a prostitute, referencing her alleged past. The influence of Italian painting, which Van Scorel encountered during a sojourn in Rome and Venice, is evident in her clothing.","img":"https://iiif.micr.io/VGOCe/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/VGOCe/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-372--9f57e2dc4c3c546e1ddef2246281e0dd"},{"title":"Haarlem Citizen","artist":"Jan van Scorel","tag":"Paintings","date":"1529","medium":"oil on panel","dims":"width 34.5 cm","loc":"Rijksmuseum, Amsterdam","desc":"The only thing known about this man is inscribed in Latin on the trompe-l’oeil cartellino on the original frame: ‘In the year of our Lord 1529 / true age 46.’ The word ‘true’ implicitly emphasizes the memory of his appearance at that specific moment. The little piece of paper seems about to come loose at any moment and thus refers to the transience of earthly existence.","img":"https://iiif.micr.io/BGQRV/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/BGQRV/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3853--f5d617083fc6491ef7026a8ed0f03673"},{"title":"Landscape with Bathsheba","artist":"Jan van Scorel","tag":"Paintings","date":"c. 1540 - c. 1545","medium":"oil on panel","dims":"width 203.9 cm","loc":"Rijksmuseum, Amsterdam","desc":"Everything here exudes Classical antiquity, from the ancient fountain statues to the Classical architecture of the palace. The biblical story is subordinate to the vast panorama. Bathsheba sits bathing at lower left and is being spied on by King David, the small figure on the balcony at upper right. Even from that distance, he is seduced by Bathsheba’s beauty.","img":"https://iiif.micr.io/chNmg/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/chNmg/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-670--62aacc7bb30b9f8f0072dae4b58d931b"},{"title":"Portrait of Reinoud III of Brederode","artist":"Jan van Scorel","tag":"Paintings","date":"c. 1545","medium":"oil on panel","dims":"width 67 cm x height 77.2 cm x width 67 cm","loc":"Rijksmuseum, Amsterdam","desc":"Reinoud III of Brederode is portrayed here as a high official – with the insignia of the Order of the Golden Fleece, wearing expensive clothes and holding a richly decorated dagger in his hand. The nobleman was one of the chief supporters of Emperor Charles V, serving him in all kinds of important administrative roles.","img":"https://iiif.micr.io/pOxxg/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/pOxxg/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-1619--3c8879a3efd141bd153e5ba9c243f11c"},{"title":"Worship of the Golden Calf","artist":"Lucas van Leyden","tag":"Paintings","date":"c. 1530","medium":"oil on panel","dims":"","loc":"Rijksmuseum, Amsterdam","desc":"This biblical narrative, showing the Israelites who were disloyal to God by worshipping the golden statue of a calf, was set by Lucas van Leyden in a continuous landscape. The triptych warns against faithlessness and debauchery. The choice of this rare subject is perhaps connected to the rise of Protestantism, with its strong aversion to the Roman Catholic veneration of religious images.","img":"https://iiif.micr.io/YMqmF/full/max/0/default.jpg","imgSmall":"https://iiif.micr.io/YMqmF/full/!1024,1024/0/default.jpg","credit":"Rijksmuseum","link":"https://www.rijksmuseum.nl/en/collectie/object/SK-A-3841--5c339ff0bb6f85bad2f3183ed10da73b"}];

// Filters
var activeFilters = { region: null, medium: null, collection: null, artist: null, query: '' };

function normalizeMedium(m) {
  m = (m || '').toLowerCase();
  if (m.indexOf('oil') !== -1) return 'Oil';
  if (m.indexOf('tempera') !== -1) return 'Tempera';
  if (m.indexOf('fresco') !== -1) return 'Fresco';
  if (m.indexOf('watercolor') !== -1) return 'Watercolor';
  if (m.indexOf('gouache') !== -1) return 'Gouache';
  if (m.indexOf('pastel') !== -1) return 'Pastel';
  return 'Other';
}

function buildDropdown(ddId, btnId, key, getVal) {
  var counts = {};
  P.forEach(function(p) { var v = getVal(p); if (v) counts[v] = (counts[v]||0)+1; });
  var vals = Object.keys(counts).sort();
  if (key === 'artist') vals = vals.filter(function(v){ return counts[v] >= 3; });
  var dd = document.getElementById(ddId);
  var html = '<button class="filter-option" data-val="">All</button>';
  vals.forEach(function(v) { html += '<button class="filter-option" data-val="' + escHtml(v) + '">' + escHtml(v) + '</button>'; });
  dd.innerHTML = html;
  dd.querySelectorAll('.filter-option').forEach(function(opt) {
    opt.addEventListener('click', function() {
      activeFilters[key] = opt.dataset.val || null;
      dd.querySelectorAll('.filter-option').forEach(function(o){ o.classList.remove('selected'); });
      opt.classList.add('selected');
      var btn = document.getElementById(btnId);
      btn.classList.toggle('active', !!activeFilters[key]);
      closeAllDropdowns();
      renderGallery();
    });
  });
}

function closeAllDropdowns() {
  document.querySelectorAll('.filter-dropdown').forEach(function(d){ d.classList.remove('open'); });
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('open'); });
}

function setupToggle(btnId, ddId) {
  var btn = document.getElementById(btnId);
  var dd = document.getElementById(ddId);
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) { dd.classList.add('open'); btn.classList.add('open'); }
  });
}

document.addEventListener('click', closeAllDropdowns);

buildDropdown('ddRegion',     'btnRegion',     'region',     function(p){ return p.tag; });
buildDropdown('ddMedium',     'btnMedium',     'medium',     function(p){ return normalizeMedium(p.medium); });
buildDropdown('ddCollection', 'btnCollection', 'collection', function(p){ return p.loc; });
buildDropdown('ddArtist',     'btnArtist',     'artist',     function(p){ return p.artist; });

setupToggle('btnRegion',     'ddRegion');
setupToggle('btnMedium',     'ddMedium');
setupToggle('btnCollection', 'ddCollection');
setupToggle('btnArtist',     'ddArtist');

document.getElementById('searchInput').addEventListener('input', function(e) {
  activeFilters.query = e.target.value.trim().toLowerCase();
  renderGallery();
});

renderGallery();

function renderGallery() {
  gallery.innerHTML = '';
  var q = activeFilters.query;
  var visible = P.filter(function(p) {
    if (activeFilters.region     && p.tag  !== activeFilters.region)                    return false;
    if (activeFilters.medium     && normalizeMedium(p.medium) !== activeFilters.medium)  return false;
    if (activeFilters.collection && p.loc  !== activeFilters.collection)                 return false;
    if (activeFilters.artist     && p.artist !== activeFilters.artist)                   return false;
    if (q && (p.title + ' ' + p.artist).toLowerCase().indexOf(q) === -1)                 return false;
    return true;
  });
  if (visible.length === 0) {
    gallery.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px 20px;font-family:Cinzel,serif;font-size:.6rem;letter-spacing:.25em;color:var(--gold);opacity:.4;text-transform:uppercase;">No works match this filter.</div>';
    return;
  }
  visible.forEach(function(p) {
    var a = document.createElement('article');
    a.className = 'card';
    var img = document.createElement('img');
    img.src = p.imgSmall; img.alt = escHtml(p.title); img.loading = 'lazy';
    var veil = document.createElement('div'); veil.className = 'veil';
    var cap = document.createElement('div'); cap.className = 'cap';
    cap.innerHTML = '<div class="cap-title">' + escHtml(p.title) + '</div>' +
      '<div class="cap-artist">' + escHtml(p.artist) + '</div>' +
      '<div class="cap-date">' + escHtml(p.date) + '</div>';
    a.appendChild(img); a.appendChild(veil); a.appendChild(cap);
    a.addEventListener('click', function(){ openLB(p); });
    gallery.appendChild(a);
  });
}

function getVisible() {
  var q = activeFilters.query;
  return P.filter(function(p) {
    if (activeFilters.region     && p.tag    !== activeFilters.region)                   return false;
    if (activeFilters.medium     && normalizeMedium(p.medium) !== activeFilters.medium)  return false;
    if (activeFilters.collection && p.loc    !== activeFilters.collection)               return false;
    if (activeFilters.artist     && p.artist !== activeFilters.artist)                   return false;
    if (q && (p.title + ' ' + p.artist).toLowerCase().indexOf(q) === -1)                 return false;
    return true;
  });
}

function openLB(p) {
  var visible = getVisible();
  currentIdx = visible.indexOf(p);
  renderLB(visible);
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLB(visible) {
  if (!visible) visible = getVisible();
  var p = visible[currentIdx];
  var img = document.getElementById('lbImg');
  img.style.opacity = 0;
  img.src = p.img; img.alt = escHtml(p.title);
  img.onload = function(){ img.style.transition='opacity 0.3s'; img.style.opacity=1; };
  document.getElementById('lbTag').textContent = p.tag;
  document.getElementById('lbTitle').textContent = p.title;
  document.getElementById('lbArtist').textContent = p.artist;
  document.getElementById('lbDesc').textContent = p.desc;
  document.getElementById('lbCredit').textContent = p.credit;
  document.getElementById('lbFields').innerHTML =
    '<div class="lb-field"><label>Date</label><span>' + escHtml(p.date) + '</span></div>' +
    '<div class="lb-field"><label>Medium</label><span>' + escHtml(p.medium) + '</span></div>' +
    '<div class="lb-field"><label>Dimensions</label><span>' + escHtml(p.dims) + '</span></div>' +
    '<div class="lb-field"><label>Location</label><span>' + escHtml(p.loc) + '</span></div>';
  document.getElementById('lbPrev').style.opacity = currentIdx === 0 ? '0.2' : '1';
  document.getElementById('lbNext').style.opacity = currentIdx === visible.length-1 ? '0.2' : '1';
  document.getElementById('lbCounter').textContent = (currentIdx+1) + ' / ' + visible.length;
}

function navigate(dir) {
  var visible = getVisible();
  var next = currentIdx + dir;
  if (next >= 0 && next < visible.length) { currentIdx = next; renderLB(visible); }
}

function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
lbX.addEventListener('click', closeLB);
document.getElementById('lbPrev').addEventListener('click', function(e){ e.stopPropagation(); navigate(-1); });
document.getElementById('lbNext').addEventListener('click', function(e){ e.stopPropagation(); navigate(1); });
document.addEventListener('keydown', function(e){
  if (!lb.classList.contains('open')) return;
  if (e.key==='Escape') closeLB();
  if (e.key==='ArrowLeft') navigate(-1);
  if (e.key==='ArrowRight') navigate(1);
});
var touchStartX = 0, touchStartY = 0, touchStartDist = 0;
function getTouchDist(e) {
  if (e.touches.length < 2) return 0;
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
lb.addEventListener('touchstart', function(e){
  if (e.touches.length === 2) { touchStartDist = getTouchDist(e); return; }
  touchStartDist = 0;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
lb.addEventListener('touchend', function(e){
  if (touchStartDist > 0) return;
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2) { navigate(dx < 0 ? 1 : -1); }
});
lb.addEventListener('touchmove', function(e){
  if (e.touches.length >= 2) touchStartDist = getTouchDist(e);
}, {passive:true});
</script>
