<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaissance Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#C4A35A; --gold2:#E8C97A; --dim:#8B6A2A; --ink:#0C0A06; --paper:#F2E8D0; --muted:#C8B890; --wall:#131009; --gallery-bg:#070503; --lb-bg:rgba(3,2,0,.96); }
[data-theme="light"] { --ink:#F5EDD8; --paper:#2B1E0E; --muted:#6B4F2A; --wall:#E8DCC4; --gallery-bg:#D9CEB0; --lb-bg:rgba(240,230,210,.97); }
body { background:var(--ink); color:var(--paper); font-family:'EB Garamond',serif; min-height:100vh; }
header { text-align:center; padding:18px 20px 14px; border-bottom:1px solid rgba(196,163,90,.14); }
.orn { display:none; }
h1 {
  font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(1.5rem,5vw,3.2rem);
  background:linear-gradient(160deg,var(--dim) 0%,var(--gold2) 35%,var(--gold) 65%,var(--dim) 100%);
  background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:gleam 6s ease-in-out infinite;
}
@keyframes gleam { 0%,100%{background-position:0%} 50%{background-position:100%} }
.sub { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.32em; text-transform:uppercase; color:var(--muted); opacity:.5; margin-top:6px; }
.rule { display:flex; align-items:center; justify-content:center; gap:13px; margin-top:10px; }
.rl { height:1px; width:65px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.rd { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); opacity:.58; }
.gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:2px; padding:2px; background:var(--gallery-bg); }
.card { position:relative; cursor:pointer; overflow:hidden; background:var(--wall); }
.card img { display:block; width:100%; height:auto; transition:transform .55s ease; }
.card:hover img { transform:scale(1.05); filter:brightness(1.07); }
.veil { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.84) 0%,transparent 60%); opacity:0; transition:opacity .32s; }
.card:hover .veil { opacity:1; }
.cap { position:absolute; bottom:0; left:0; right:0; padding:18px 14px 13px; transform:translateY(5px); opacity:0; transition:transform .32s ease, opacity .32s ease; }
.card:hover .cap { transform:translateY(0); opacity:1; }
.cap-title { font-family:'Cinzel',serif; font-size:.8rem; color:var(--paper); }
.cap-artist { font-style:italic; font-size:.74rem; color:var(--gold); margin-top:3px; }
.cap-date { font-size:.6rem; color:var(--muted); opacity:.55; margin-top:2px; }
.lb { display:none; position:fixed; inset:0; z-index:1000; background:var(--lb-bg); backdrop-filter:blur(18px); overflow-y:auto; }
.lb.open { display:block; animation:lbIn .28s ease; }
@keyframes lbIn { from{opacity:0} to{opacity:1} }
.lb-inner { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:40px; padding:60px 28px 80px; }
.lb-img { flex:0 0 auto; max-width:min(580px,88vw); box-shadow:0 28px 80px rgba(0,0,0,.92); }
.lb-img img { display:block; width:100%; height:auto; }
.lb-info { flex:1 1 260px; max-width:340px; }
.lb-tag { font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.38em; text-transform:uppercase; color:var(--gold); opacity:.46; margin-bottom:10px; }
.lb-title { font-family:'Cinzel Decorative',serif; font-size:clamp(1rem,3.5vw,1.65rem); color:var(--paper); line-height:1.2; margin-bottom:7px; }
.lb-artist { font-style:italic; font-size:1rem; color:var(--gold); margin-bottom:13px; }
.lb-hr { height:1px; background:linear-gradient(90deg,rgba(196,163,90,.28),transparent); margin-bottom:15px; }
.lb-fields { display:grid; grid-template-columns:1fr 1fr; gap:11px 14px; margin-bottom:15px; }
.lb-field label { display:block; font-family:'Cinzel',serif; font-size:.48rem; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); opacity:.42; margin-bottom:2px; }
.lb-field span { font-size:.8rem; color:var(--muted); line-height:1.4; }
.lb-desc { font-size:.87rem; line-height:1.7; color:var(--muted); opacity:.68; margin-bottom:14px; }
.lb-credit { font-size:.56rem; color:var(--muted); opacity:.26; }
.lb-close { position:fixed; top:14px; right:14px; z-index:10; width:36px; height:36px; border:1px solid rgba(196,163,90,.26); background:rgba(0,0,0,.72); color:var(--gold); font-size:.88rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.lb-close:hover { background:rgba(196,163,90,.1); }
footer { text-align:center; padding:28px 16px; border-top:1px solid rgba(196,163,90,.06); font-family:'Cinzel',serif; font-size:.48rem; letter-spacing:.2em; color:var(--gold); opacity:.2; text-transform:uppercase; }
.theme-toggle { position:fixed; top:14px; left:14px; z-index:900; width:36px; height:36px; border:1px solid rgba(196,163,90,.26); background:rgba(0,0,0,.35); color:var(--gold); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.theme-toggle:hover { background:rgba(196,163,90,.1); }
[data-theme="light"] .theme-toggle { background:rgba(255,255,255,.45); }
[data-theme="light"] .lb-tag { opacity:.75; }
[data-theme="light"] .lb-field label { opacity:.7; }
[data-theme="light"] .lb-desc { opacity:.85; }
[data-theme="light"] .lb-credit { opacity:.55; }
[data-theme="light"] .lb-close, [data-theme="light"] .lb-nav { background:rgba(200,180,140,.5); border-color:rgba(139,106,42,.4); }

.lb-nav { position:fixed; top:50%; transform:translateY(-50%); z-index:10; width:44px; height:44px; border:1px solid rgba(196,163,90,.3); background:rgba(0,0,0,.7); color:var(--gold); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.lb-nav:hover { background:rgba(196,163,90,.15); border-color:var(--gold); }
.lb-prev { left:14px; }
.lb-next { right:58px; }
@media (max-width:600px) { .lb-next { right:14px; } }
.lb-counter { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.25em; color:var(--gold); opacity:.45; z-index:10; }
</style>
</head>
<body>
<header>
  <span class="orn">✦ ✦ ✦</span>
  <h1>Galleria del Rinascimento</h1>
  <p class="sub">Masterworks of the Golden Age · XV – XVII Century</p>
  <div class="rule"><div class="rl"></div><div class="rd"></div><div class="rl"></div></div>
</header>
<main class="gallery" id="gallery"></main>
<div class="lb" id="lb">
  <button class="lb-close" id="lbX">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">&#8592;</button>
  <button class="lb-nav lb-next" id="lbNext">&#8594;</button>
  <div class="lb-counter" id="lbCounter"></div>
  <div class="lb-inner">
    <div class="lb-img"><img id="lbImg" src="" alt=""></div>
    <div class="lb-info">
      <div class="lb-tag" id="lbTag"></div>
      <h2 class="lb-title" id="lbTitle"></h2>
      <div class="lb-artist" id="lbArtist"></div>
      <div class="lb-hr"></div>
      <div class="lb-fields" id="lbFields"></div>
      <p class="lb-desc" id="lbDesc"></p>
      <div class="lb-credit" id="lbCredit"></div>
    </div>
  </div>
</div>
<button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">☀</button>
<footer>All works public domain</footer>
<script>
// Theme toggle
(function(){
  var btn = document.getElementById('themeToggle');
  var saved = localStorage.getItem('rg-theme');
  if (saved === 'light') { document.documentElement.setAttribute('data-theme','light'); btn.textContent = '☽'; }
  btn.addEventListener('click', function(){
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      btn.textContent = '☀';
      localStorage.setItem('rg-theme','dark');
    } else {
      document.documentElement.setAttribute('data-theme','light');
      btn.textContent = '☽';
      localStorage.setItem('rg-theme','light');
    }
  });
})();

var gallery = document.getElementById('gallery');
var lb = document.getElementById('lb');
var lbX = document.getElementById('lbX');
var currentIdx = 0;

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var P = [{"title":"The Penitence of Saint Jerome","artist":"Joachim Patinir","tag":"Paintings","date":"ca. 1515","medium":"Oil on wood","dims":"Shaped top: central panel, overall, with engaged frame, 46 1/4 x 32 in. (117.5 x 81.3 cm); each wing, overall, with engaged frame, 47 1/2 x 14 in. (120.7 x 35.6 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Fletcher Fund, 1936","img":"https://images.metmuseum.org/CRDImages/ep/original/DT5549.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DT5549.jpg","credit":"Fletcher Fund, 1936","link":"https://www.metmuseum.org/art/collection/search/437261"},{"title":"The Nativity with Donors and Saints Jerome and Leonard","artist":"Gerard David","tag":"Paintings","date":"ca. 1510–15","medium":"Oil on canvas, transferred from wood","dims":"Central panel 35 1/2 x 28 in. (90.2 x 71.1 cm); each wing 35 1/2 x 12 3/8 in. (90.2 x 31.4 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"The Jules Bache Collection, 1949","img":"https://images.metmuseum.org/CRDImages/ep/original/DT1476.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DT1476.jpg","credit":"The Jules Bache Collection, 1949","link":"https://www.metmuseum.org/art/collection/search/436099"},{"title":"Christ Bearing the Cross","artist":"North Netherlandish (Bruges) Painter","tag":"Paintings","date":"-","medium":"Oil on wood","dims":"42 3/8 x 32 3/8 in. (107.6 x 82.2 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Bequest of George D. Pratt, 1935","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-20751-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-20751-001.jpg","credit":"Bequest of George D. Pratt, 1935","link":"https://www.metmuseum.org/art/collection/search/437202"},{"title":"The Musicians","artist":"Caravaggio (Michelangelo Merisi)","tag":"Paintings","date":"1597","medium":"Oil on canvas","dims":"36 1/4 x 46 5/8 in. (92.1 x 118.4 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Rogers Fund, 1952","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-687-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-687-001.jpg","credit":"Rogers Fund, 1952","link":"https://www.metmuseum.org/art/collection/search/435844"},{"title":"Hermann von Wedigh III (died 1560)","artist":"Hans Holbein the Younger","tag":"Paintings","date":"1532","medium":"Oil and gold on oak","dims":"16 5/8 x 12 3/4 in. (42.2 x 32.4 cm), with added strip of 1/2 in. (1.3 cm) at bottom","loc":"Metropolitan Museum of Art, New York, NY","desc":"Bequest of Edward S. Harkness, 1940","img":"https://images.metmuseum.org/CRDImages/ep/original/DP164836.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP164836.jpg","credit":"Bequest of Edward S. Harkness, 1940","link":"https://www.metmuseum.org/art/collection/search/436658"},{"title":"Portrait of a Woman with a Man at a Casement","artist":"Fra Filippo Lippi","tag":"Paintings","date":"ca. 1440","medium":"Tempera on wood","dims":"25 1/4 x 16 1/2 in. (64.1 x 41.9 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Marquand Collection, Gift of Henry G. Marquand, 1889","img":"https://images.metmuseum.org/CRDImages/ep/original/DP159891.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP159891.jpg","credit":"Marquand Collection, Gift of Henry G. Marquand, 1889","link":"https://www.metmuseum.org/art/collection/search/436896"},{"title":"The Adoration of the Magi","artist":"Joos van Wassenhove","tag":"Paintings","date":"1472–74","medium":"Distemper on canvas","dims":"43 x 63 in. (109.2 x 160 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Bequest of George Blumenthal, 1941","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-16339-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-16339-001.jpg","credit":"Bequest of George Blumenthal, 1941","link":"https://www.metmuseum.org/art/collection/search/436803"},{"title":"Friedrich III (1463–1525), the Wise, Elector of Saxony","artist":"Lucas Cranach the Elder and Workshop","tag":"Paintings","date":"1533","medium":"Oil on beech, with letterpress-printed paper labels","dims":"8 x 5 5/8 in. (20.3 x 14.3 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Gift of Robert Lehman, 1946","img":"https://images.metmuseum.org/CRDImages/ep/original/DP278968.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP278968.jpg","credit":"Gift of Robert Lehman, 1946","link":"https://www.metmuseum.org/art/collection/search/436043"},{"title":"The Birth of the Virgin","artist":"Fra Carnevale (Bartolomeo di Giovanni Corradini)","tag":"Paintings","date":"1467","medium":"Tempera and oil on wood","dims":"57 x 37 7/8 in. (144.8 x 96.2 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Rogers and Gwynne Andrews Funds, 1935","img":"https://images.metmuseum.org/CRDImages/ep/original/DP109484.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP109484.jpg","credit":"Rogers and Gwynne Andrews Funds, 1935","link":"https://www.metmuseum.org/art/collection/search/435848"},{"title":"Christ Healing the Blind","artist":"El Greco (Domenikos Theotokopoulos)","tag":"Paintings","date":"ca. 1570","medium":"Oil on canvas","dims":"47 x 57 1/2 in. (119.4 x 146.1 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Gift of Mr. and Mrs. Charles Wrightsman, 1978","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-26505-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-26505-001.jpg","credit":"Gift of Mr. and Mrs. Charles Wrightsman, 1978","link":"https://www.metmuseum.org/art/collection/search/436572"},{"title":"Holy Family with an Angel","artist":"Raffaellino del Garbo","tag":"Paintings","date":"ca. 1490","medium":"Tempera on canvas, transferred from wood","dims":"22 x 15 in. (55.9 x 38.1 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Bequest of Benjamin Altman, 1913","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-15089-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-15089-001.jpg","credit":"Bequest of Benjamin Altman, 1913","link":"https://www.metmuseum.org/art/collection/search/437368"},{"title":"Portrait of a Woman, Possibly a Nun of San Secondo","artist":"Jacometto (Jacometto Veneziano)","tag":"Paintings","date":"ca. 1485–95","medium":"Oil on wood","dims":"Overall 4 x 2 7/8 in. (10.2 x 7.3 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Robert Lehman Collection, 1975","img":"https://images.metmuseum.org/CRDImages/rl/original/DP221483.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/rl/web-large/DP221483.jpg","credit":"Robert Lehman Collection, 1975","link":"https://www.metmuseum.org/art/collection/search/459027"},{"title":"Portrait of Alvise Contarini(?)","artist":"Jacometto (Jacometto Veneziano)","tag":"Paintings","date":"ca. 1485–95","medium":"Oil on wood","dims":"Overall 4 5/8 x 3 3/8 in.","loc":"Metropolitan Museum of Art, New York, NY","desc":"Robert Lehman Collection, 1975","img":"https://images.metmuseum.org/CRDImages/rl/original/DP221485.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/rl/web-large/DP221485.jpg","credit":"Robert Lehman Collection, 1975","link":"https://www.metmuseum.org/art/collection/search/459028"},{"title":"The Fifteen Mysteries and the Virgin of the Rosary","artist":"Netherlandish (Brussels) Painter","tag":"Paintings","date":"ca. 1515–20","medium":"Oil on wood","dims":"(a) 9 7/8 x 21 in. (25.1 x 53.3 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Anonymous Bequest, 1984","img":"https://images.metmuseum.org/CRDImages/ep/original/DT5754.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DT5754.jpg","credit":"Anonymous Bequest, 1984","link":"https://www.metmuseum.org/art/collection/search/437216"},{"title":"Salvator Mundi","artist":"Hans Memling","tag":"Paintings","date":"1480–85","medium":"Oil on wood","dims":"Overall, with integral frame, diameter 10 3/4 in. (27.3 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"The Friedsam Collection, Bequest of Michael Friedsam, 1931","img":"https://images.metmuseum.org/CRDImages/ep/original/DP-19586-001.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP-19586-001.jpg","credit":"The Friedsam Collection, Bequest of Michael Friedsam, 1931","link":"https://www.metmuseum.org/art/collection/search/437061"},{"title":"Johann I (1468–1532), the Constant, Elector of Saxony","artist":"Lucas Cranach the Elder and Workshop","tag":"Paintings","date":"1532–33","medium":"Oil on beech, with letterpress-printed paper labels","dims":"8 x 5 5/8 in. (20.3 x 14.3 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Gift of Robert Lehman, 1946","img":"https://images.metmuseum.org/CRDImages/ep/original/DP278975.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP278975.jpg","credit":"Gift of Robert Lehman, 1946","link":"https://www.metmuseum.org/art/collection/search/436045"},{"title":"Johann I (1468–1532), the Constant, Elector of Saxony","artist":"Lucas Cranach the Elder","tag":"Paintings","date":"1532–33","medium":"Oil on canvas, transferred from wood","dims":"8 1/4 x 5 7/8 in. (21 x 14.9 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Purchase, 1871","img":"https://images.metmuseum.org/CRDImages/ep/original/DP280599.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP280599.jpg","credit":"Purchase, 1871","link":"https://www.metmuseum.org/art/collection/search/436046"},{"title":"The Adoration of the Magi","artist":"Hugo van der Goes","tag":"Paintings","date":"-","medium":"Oil on wood","dims":"29 1/8 x 25 5/8 in. (74 x 65.1 cm)","loc":"Metropolitan Museum of Art, New York, NY","desc":"Purchase, 1871","img":"https://images.metmuseum.org/CRDImages/ep/original/DP332733.jpg","imgSmall":"https://images.metmuseum.org/CRDImages/ep/web-large/DP332733.jpg","credit":"Purchase, 1871","link":"https://www.metmuseum.org/art/collection/search/436523"}];

renderGallery();

function renderGallery() {
  gallery.innerHTML = '';
  P.forEach(function(p) {
    var a = document.createElement('article');
    a.className = 'card';
    var img = document.createElement('img');
    img.src = p.imgSmall; img.alt = escHtml(p.title); img.loading = 'lazy';
    var veil = document.createElement('div'); veil.className = 'veil';
    var cap = document.createElement('div'); cap.className = 'cap';
    cap.innerHTML = '<div class="cap-title">' + escHtml(p.title) + '</div>' +
      '<div class="cap-artist">' + escHtml(p.artist) + '</div>' +
      '<div class="cap-date">' + escHtml(p.date) + '</div>';
    a.appendChild(img); a.appendChild(veil); a.appendChild(cap);
    a.addEventListener('click', function(){ openLB(p); });
    gallery.appendChild(a);
  });
}

function openLB(p) {
  currentIdx = P.indexOf(p);
  renderLB();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLB() {
  var p = P[currentIdx];
  var img = document.getElementById('lbImg');
  img.style.opacity = 0;
  img.src = p.img; img.alt = escHtml(p.title);
  img.onload = function(){ img.style.transition='opacity 0.3s'; img.style.opacity=1; };
  document.getElementById('lbTag').textContent = p.tag;
  document.getElementById('lbTitle').textContent = p.title;
  document.getElementById('lbArtist').textContent = p.artist;
  document.getElementById('lbDesc').textContent = p.desc;
  document.getElementById('lbCredit').textContent = p.credit;
  document.getElementById('lbFields').innerHTML =
    '<div class="lb-field"><label>Date</label><span>' + escHtml(p.date) + '</span></div>' +
    '<div class="lb-field"><label>Medium</label><span>' + escHtml(p.medium) + '</span></div>' +
    '<div class="lb-field"><label>Dimensions</label><span>' + escHtml(p.dims) + '</span></div>' +
    '<div class="lb-field"><label>Location</label><span>' + escHtml(p.loc) + '</span></div>';
  document.getElementById('lbPrev').style.opacity = currentIdx === 0 ? '0.2' : '1';
  document.getElementById('lbNext').style.opacity = currentIdx === P.length-1 ? '0.2' : '1';
  document.getElementById('lbCounter').textContent = (currentIdx+1) + ' / ' + P.length;
}

function navigate(dir) {
  var next = currentIdx + dir;
  if (next >= 0 && next < P.length) { currentIdx = next; renderLB(); }
}

function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
lbX.addEventListener('click', closeLB);
document.getElementById('lbPrev').addEventListener('click', function(e){ e.stopPropagation(); navigate(-1); });
document.getElementById('lbNext').addEventListener('click', function(e){ e.stopPropagation(); navigate(1); });
document.addEventListener('keydown', function(e){
  if (!lb.classList.contains('open')) return;
  if (e.key==='Escape') closeLB();
  if (e.key==='ArrowLeft') navigate(-1);
  if (e.key==='ArrowRight') navigate(1);
});
var touchStartX = 0, touchStartY = 0, touchStartDist = 0;
function getTouchDist(e) {
  if (e.touches.length < 2) return 0;
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
lb.addEventListener('touchstart', function(e){
  if (e.touches.length === 2) { touchStartDist = getTouchDist(e); return; }
  touchStartDist = 0;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
lb.addEventListener('touchend', function(e){
  if (touchStartDist > 0) return;
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2) { navigate(dx < 0 ? 1 : -1); }
});
lb.addEventListener('touchmove', function(e){
  if (e.touches.length >= 2) touchStartDist = getTouchDist(e);
}, {passive:true});
</script>
</body>
</html>
